  hardware:
    h200: verified

model:
  model_id: "JetBrains/Mellum2-12B-A2.5B-Instruct"
  min_vllm_version: "nightly"
  nightly_required: true
  architecture: moe
  parameter_count: "12B"
  active_parameters: "2.5B"
  context_length: 131072
  base_args:
    - "--max-model-len"
