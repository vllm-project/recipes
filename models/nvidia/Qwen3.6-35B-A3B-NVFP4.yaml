meta:
  title: "Qwen3.6-35B-A3B-NVFP4 (NVIDIA)"
  slug: "qwen3.6-35b-a3b-nvfp4"
  provider: "NVIDIA"
  description: "NVIDIA ModelOpt NVFP4 quantization of Qwen3.6-35B-A3B, tuned for DGX Spark"
  date_updated: 2026-05-28
  difficulty: intermediate
  tasks:
    - text
  related_recipes:
    - "Qwen/Qwen3.6-35B-A3B"
  hardware:
    dgx_spark_gb10: verified

default_hardware: dgx_spark_gb10

model:
  model_id: "nvidia/Qwen3.6-35B-A3B-NVFP4"
  min_vllm_version: "nightly"
  nightly_required: true
  architecture: moe
  parameter_count: "35B"
  active_parameters: "3B"
  context_length: 262144
  base_args:
    - "--trust-remote-code"
    - "--quantization"
    - "modelopt"
    - "--kv-cache-dtype"
    - "fp8"
    - "--attention-backend"
    - "flashinfer"
    - "--moe-backend"
    - "marlin"
    - "--gpu-memory-utilization"
    - "0.85"
    - "--max-model-len"
    - "65536"
    - "--max-num-seqs"
    - "4"
    - "--max-num-batched-tokens"
    - "8192"
    - "--speculative-config"
    - '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'
  base_env:
    VLLM_FP8_MOE_BACKEND: "flashinfer_cutlass"
    FLASHINFER_DISABLE_VERSION_CHECK: "1"
    CUTE_DSL_ARCH: "sm_121a"

features:
  tool_calling:
    description: "Enable automatic tool choice with Qwen3 Coder parser"
    args:
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_coder"
  reasoning:
    description: "Chain-of-thought reasoning with Qwen3 parser"
    args:
      - "--reasoning-parser"
      - "qwen3"

opt_in_features:
  - tool_calling
  - reasoning

variants:
  default:
    precision: nvfp4
    vram_minimum_gb: 21
    description: "NVIDIA ModelOpt NVFP4 weights for DGX Spark"

compatible_strategies:
  - single_node_tp

hardware_overrides: {}

strategy_overrides: {}

guide: |
  ## Overview

  [Qwen3.6-35B-A3B-NVFP4](https://huggingface.co/nvidia/Qwen3.6-35B-A3B-NVFP4)
  is NVIDIA's ModelOpt-native NVFP4 quantization of
  [Qwen/Qwen3.6-35B-A3B](https://huggingface.co/Qwen/Qwen3.6-35B-A3B). The checkpoint
  is tuned for DGX Spark serving with FP8 KV cache, FlashInfer attention, and
  ModelOpt quantization.

  ## Prerequisites

  - **Hardware:** DGX Spark (GB10, 128 GB unified memory)
  - **vLLM:** nightly or a source build with ModelOpt W4A16/NVFP4 support for this
    checkpoint
  - **Hugging Face:** access to the gated NVIDIA checkpoint
  - **Docker:** NVIDIA Container Toolkit recommended

  ## DGX Spark Launch

  ```bash
  export VLLM_FP8_MOE_BACKEND=flashinfer_cutlass
  export FLASHINFER_DISABLE_VERSION_CHECK=1
  export CUTE_DSL_ARCH=sm_121a
  ```

  ```bash
  vllm serve nvidia/Qwen3.6-35B-A3B-NVFP4 \
    --trust-remote-code \
    --dtype auto \
    --quantization modelopt \
    --kv-cache-dtype fp8 \
    --attention-backend flashinfer \
    --moe-backend marlin \
    --gpu-memory-utilization 0.85 \
    --max-model-len 65536 \
    --max-num-seqs 4 \
    --max-num-batched-tokens 8192 \
    --speculative-config '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'
  ```

  Key flags:

  - The ModelOpt quantization metadata is baked into the checkpoint; no manual
    compressed-tensors override is required.
  - `--quantization modelopt` selects the ModelOpt quantization path.
  - `--kv-cache-dtype fp8` keeps KV cache memory low for longer contexts.
  - `--max-model-len 65536`, `--max-num-seqs 4`, and
    `--max-num-batched-tokens 8192` are the Spark serving shape used for this
    recipe.
  - Optional throughput knobs such as `--async-scheduling` can be added after
    profiling. On vLLM V1/nightly, prefix caching and chunked prefill are enabled
    by default when supported, so this recipe does not pass them explicitly.

  ## References

  - [Model card](https://huggingface.co/nvidia/Qwen3.6-35B-A3B-NVFP4)
  - [Parent Qwen3.6-35B-A3B recipe](../Qwen/Qwen3.6-35B-A3B)
