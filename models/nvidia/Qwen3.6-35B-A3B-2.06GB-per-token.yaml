meta:
  title: "Qwen3.6-35B-A3B-2.06GB-per-token (NVIDIA)"
  slug: "qwen3.6-35b-a3b-2.06gb-per-token"
  provider: "NVIDIA"
  description: "NVIDIA ModelOpt mixed-precision quantization of Qwen3.6-35B-A3B with NVFP4 MoE/lm_head weights and FP8 attention projections, tuned for DGX Spark"
  date_updated: 2026-05-18
  difficulty: intermediate
  tasks:
    - text
  related_recipes:
    - "Qwen/Qwen3.6-35B-A3B"
  hardware:
    dgx_spark_gb10: verified

default_hardware: dgx_spark_gb10

model:
  model_id: "nvidia/Qwen3.6-35B-A3B-2.06GB-per-token"
  min_vllm_version: "nightly"
  nightly_required: true
  architecture: moe
  parameter_count: "35B"
  active_parameters: "3B"
  context_length: 262144
  base_args:
    - "--trust-remote-code"
    - "--kv-cache-dtype"
    - "fp8"
  base_env: {}

features:
  tool_calling:
    description: "Enable automatic tool choice with Qwen3 Coder parser"
    args:
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_coder"
  reasoning:
    description: "Chain-of-thought reasoning with Qwen3 parser"
    args:
      - "--reasoning-parser"
      - "qwen3"
  spec_decoding:
    description: "MTP speculative decoding with Triton MoE backend for the draft path"
    args:
      - "--speculative-config"
      - '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'

opt_in_features:
  - spec_decoding

variants:
  default:
    precision: nvfp4
    vram_minimum_gb: 21
    description: "NVIDIA ModelOpt W4A16/NVFP4 mixed-precision weights for DGX Spark"

compatible_strategies:
  - single_node_tp
  - multi_node_tp

hardware_overrides: {}

strategy_overrides: {}

guide: |
  ## Overview

  [Qwen3.6-35B-A3B-2.06GB-per-token](https://huggingface.co/nvidia/Qwen3.6-35B-A3B-2.06GB-per-token)
  is NVIDIA's ModelOpt-native mixed-precision quantization of
  [Qwen/Qwen3.6-35B-A3B](https://huggingface.co/Qwen/Qwen3.6-35B-A3B). The checkpoint
  uses NVFP4 for MoE/lm_head weights and FP8 for attention projections, and is tuned
  to hit roughly 2.06 GB of KV cache per 1M tokens with FP8 KV cache. This
  recipe targets DGX Spark.

  ## Prerequisites

  - **Hardware:** DGX Spark (GB10, 128 GB unified memory)
  - **vLLM:** nightly or a source build with ModelOpt W4A16/NVFP4 support for this
    checkpoint. As of 2026-05-18, the required vLLM support is still in open PRs:
    [#42124](https://github.com/vllm-project/vllm/pull/42124),
    [#42546](https://github.com/vllm-project/vllm/pull/42546), and
    [#42566](https://github.com/vllm-project/vllm/pull/42566).
  - **Hugging Face:** access to the gated NVIDIA checkpoint
  - **Docker:** NVIDIA Container Toolkit recommended

  ## DGX Spark Launch

  Use the published NVIDIA ModelOpt checkpoint directly:

  ```bash
  vllm serve nvidia/Qwen3.6-35B-A3B-2.06GB-per-token \
    --kv-cache-dtype fp8 \
    --trust-remote-code
  ```

  Key flags:

  - The ModelOpt quantization metadata is baked into the checkpoint; no manual
    `--quantization` flag is required.
  - `--kv-cache-dtype fp8` keeps KV cache near 2.06 GB/1M-token

  For higher throughput on Blackwell, consider adding
  `--attention-backend flashinfer`, `--enable-chunked-prefill`,
  `--async-scheduling`, `--enable-flashinfer-autotune`,
  `--enable-prefix-caching`, and `--moe-backend=marlin`.
  `VLLM_MARLIN_USE_ATOMIC_ADD=1` can help small-N Marlin MoE shapes.
  Tune batching for the workload.
  MTP speculative decoding can also be enabled with a `speculative-config`
  using `{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}`.

  ## References

  - [Model card](https://huggingface.co/nvidia/Qwen3.6-35B-A3B-2.06GB-per-token)
  - [Parent Qwen3.6-35B-A3B recipe](../Qwen/Qwen3.6-35B-A3B)
