meta:
  title: "MiniMax-M3"
  slug: "minimax-m3"
  provider: "MiniMax"
  description: "MiniMax M3 vision-language MoE (427B total / 26B active) for frontier coding, agent toolchains, and 1M-token reasoning via MSA sparse attention — native multimodal (image + video + computer use); BF16 plus MXFP8 and AMD MI355X MXFP4 variants. Runs on NVIDIA (Hopper/Blackwell) and AMD CDNA4/CDNA3."
  date_updated: 2026-06-25
  difficulty: advanced
  tasks:
    - text
    - multimodal
  performance_headline: "Frontier coding and agent (SWE-Bench Pro 59.0, Terminal-Bench 2.1 66.0); MSA sparse attention; 1M context"
  related_recipes: []
  hardware:
    h200: verified
    mi300x: verified
    mi355x: verified

model:
  model_id: "MiniMaxAI/MiniMax-M3"
  min_vllm_version: "0.24.0"
  nightly_required: true
  docker_image: 
    nvidia: "vllm/vllm-openai:minimax-m3"
    amd: "vllm/vllm-openai-rocm:minimax-m3" 
  # Docker-only: MiniMax-M3 support hasn't shipped in a stable wheel, and the
  # dedicated image is the supported path — hide the pip tab.
  install:
    docker:
    pip:
  architecture: moe
  # 427.04B total from safetensors metadata (BF16: 426.99B + F32: 46.3M).
  # Active: 57 MoE layers × (4 routed + 1 shared) × 56.6M + 60-layer attn
  # 6.6B + 3 dense FFN 0.68B + embeddings 2.46B ≈ 25.9B per token.
  parameter_count: "427B"
  active_parameters: "26B"
  # config.max_position_embeddings is 524288; MiniMax officially advertises 1M
  # via RoPE scaling — using the advertised number here.
  context_length: 1048576
  base_args:
    # MSA's sparse_block_size is 128 — KV cache block size must match.
    - "--block-size"
    - "128"
  base_env: {}

features:
  tool_calling:
    description: "MiniMax M3 tool call parser with automatic tool choice"
    args:
      - "--tool-call-parser"
      - "minimax_m3"
      - "--enable-auto-tool-choice"
  reasoning:
    description: "MiniMax M3 reasoning parser (supports `thinking` and `non-thinking` modes, switchable per request)"
    args:
      - "--reasoning-parser"
      - "minimax_m3"
  spec_decoding:
    description: "Eagle3 speculative decoding with the Inferact MiniMax-M3 draft head — accelerates decoding."
    args:
      - "--speculative-config"
      - '{"method": "eagle3", "model": "Inferact/MiniMax-M3-EAGLE3", "num_speculative_tokens": 3, "attention_backend": "FLASH_ATTN"}'
  text_only:
    description: "Skip loading the vision encoder for text-only workloads — frees VRAM for KV cache. Mutually exclusive with encoder_parallel."
    args:
      - "--language-model-only"
  encoder_parallel:
    description: "Run the vision encoder data-parallel instead of tensor-parallel — avoids TP comm overhead on the small encoder. Also enables the host-shared-memory multimodal processor cache and the per-brand encoder attention backend (FlashInfer on NVIDIA, AITER FlashAttention on AMD). Mutually exclusive with text_only."
    # No platform-agnostic `args`: this recipe targets only NVIDIA + AMD, both
    # covered by the per-brand overrides below. (A feature's top-level `args`
    # is just the fallback used when no hardware_overrides.<gen> matches.)
    hardware_overrides:
      # Per-brand vision-encoder config — each block carries shm + tp-mode plus
      # its attention backend: FlashInfer on NVIDIA, AITER FlashAttention on AMD.
      nvidia:
        args:
          - "--mm-encoder-attn-backend"
          - "FLASHINFER"
          - "--mm-processor-cache-type"
          - "shm"
          - "--mm-encoder-tp-mode"
          - "data"
      amd:
        args:
          - "--mm-encoder-attn-backend"
          - "ROCM_AITER_FA"
          - "--mm-processor-cache-type"
          - "shm"
          - "--mm-encoder-tp-mode"
          - "data"

opt_in_features:
  - spec_decoding
  - text_only
  - encoder_parallel

variants:
  default:
    precision: bf16
    # 427B × 2 bytes (BF16) + 46M × 4 (F32 norms), × 1.2 headroom ≈ 1025 GB.
    # 8x H200/H20 (1128 GB) is a tight fit; multi-node TP recommended for
    # KV-cache headroom at long context. 
    # On AMD, 8x MI350X/MI355X fits comfortably.
    vram_minimum_gb: 1025
    description: "Native BF16 checkpoint — multi-node TP recommended for long-context headroom"
  mxfp8:
    model_id: "MiniMaxAI/MiniMax-M3-MXFP8"
    precision: mxfp8
    # 427B × 1 byte (MXFP8) + F32 norms, × 1.2 ≈ 513 GB → fits 8x H200/H20
    # comfortably, ~4 GPUs for weights alone on Blackwell (B200/B300) or AMD MI350X/MI355X (gfx950)).
    vram_minimum_gb: 513
    description: "NVIDIA-quantized MXFP8 weights — Blackwell (B200/B300) for native MX tensor cores, and AMD CDNA4 (MI350X/MI355X, gfx950) for native MXFP8 Matrix Cores."
  mxfp4:
    model_id: "amd/MiniMax-M3-MXFP4"
    precision: mxfp4
    # 427B × 0.5 bytes (MXFP4) × 1.2 headroom = 256.2 GB.
    vram_minimum_gb: 257
    description: "AMD Quark OCP MXFP4 weights and dynamic MXFP4 activations for MI355X (gfx950)."
    supported_hardware:
      - mi355x
    # Match the validated InferenceX single-node baseline. TP8 also leaves
    # practical headroom for KV cache and the multimodal encoder.
    tp: 8
    hardware_overrides:
      mi355x:
        docker_image: "vllm/vllm-openai-rocm:nightly"
        extra_args:
          - "--trust-remote-code"
          # Keep the multimodal encoder loaded and run it data-parallel on MI355X.
          - "--mm-encoder-tp-mode"
          - "data"
          - "--mm-encoder-attn-backend"
          - "ROCM_AITER_FA"

compatible_strategies:
  - single_node_tp
  - single_node_tep
  - single_node_dep
  - multi_node_tp
  - multi_node_tp_pp
  - multi_node_tep
  - multi_node_dep
  - pd_cluster

hardware_overrides:
  amd:
    # ROCm MI3xx: MSA sparse attention runs on the Triton backend — this is the
    # main-model attention and is always needed on AMD. The vision-encoder
    # flags (data-parallel + AITER FlashAttention) are gated behind the
    # encoder_parallel feature, mirroring NVIDIA.
    extra_args:
      - "--attention-backend"
      - "TRITON_ATTN"
    extra_env:
      # Run MiniMax-M3 with CUDA graphs on AMD MI3xx; avoids the decode
      # breakable-cudagraph path that otherwise forces eager (per @hongxiayang).
      VLLM_USE_BREAKABLE_CUDAGRAPH: "0"
      # AITER kernels for the hot decode GEMMs + fused MoE (master toggle; the
      # per-component flags _MOE/_LINEAR/_RMSNORM/_FP8BMM default True behind it).
      # MHA stays off AITER so MSA sparse attention keeps running on TRITON_ATTN
      # — the MXFP8 checkpoint has no calibrated q/prob scales for ROCm FP8 attn.
      VLLM_ROCM_USE_AITER: "1"
      VLLM_ROCM_USE_AITER_MHA: "0"
      # AMD-recommended, numerically-inert runtime knobs. (NCCL_MIN_NCHANNELS=112
      # is a gfx942-only RCCL tuning — documented in the guide, not set here:
      # gfx950 already defaults to 112 channels for an 8-GPU node and setting it
      # explicitly bypasses RCCL's adaptive channel-tuning model.)
      TORCH_BLAS_PREFER_HIPBLASLT: "1"
      GPU_MAX_HW_QUEUES: "2"

guide: |
  ## Overview

  [MiniMax-M3](https://huggingface.co/MiniMaxAI/MiniMax-M3) is a frontier
  vision-language MoE model from [MiniMax](https://www.minimax.io/).

  - **MSA (MiniMax Sparse Attention)** — scalable sparse-attention architecture
    that lifts the context window to **1M tokens**. MiniMax reports per-token
    compute at 1M context reduced to ~1/20 of the previous generation, with
    >9× prefill and >15× decode speedup vs dense baselines.
  - **Frontier coding and agent capabilities** — SWE-Bench Pro 59.0%,
    Terminal-Bench 2.1 66.0%, SWE-fficiency 34.8%, KernelBench Hard 28.8%,
    MCP Atlas 74.2%.
  - **Native multimodal** — image + video inputs, plus computer-use; trained
    multimodally from step 0.
  - **Two reasoning modes** — `thinking` (complex reasoning / agents) and
    `non-thinking` (latency-sensitive), switchable per request.

  ## Prerequisites

  - **OS:** Linux
  - **Python:** 3.10 - 3.13
  - **NVIDIA:** compute capability >= 9.0 (Hopper) recommended; 8x H200 / H20
    for a tight single-node BF16 fit, or multi-node TP for long-context headroom
  - **AMD:** MI350X/MI355X (gfx950), MI300X/MI325X (gfx942), ROCm 7.2+. BF16
    needs TP=8; the MXFP8 variant runs from TP=4.
  - **`--block-size 128` is mandatory on every platform** (MSA sparse/index cache).

  ### Docker (NVIDIA)

  MiniMax-M3 support has not yet shipped in a stable vLLM release — use the
  dedicated Docker image:

  ```bash
  docker pull vllm/vllm-openai:minimax-m3
  ```

  ### Docker (AMD ROCm)

  MiniMax-M3 support has not yet shipped in a stable vLLM release — use the
  dedicated Docker image or nightly after the release:

  ```bash
  docker pull vllm/vllm-openai-rocm:minimax-m3
  ```

  ```bash
  docker run --rm -it --device /dev/kfd --device /dev/dri --group-add video \
    --cap-add SYS_PTRACE --security-opt seccomp=unconfined --ipc=host \
    --shm-size=16g -p 8000:8000 \
    --entrypoint /bin/bash \
    vllm/vllm-openai-rocm:minimax-m3
  ```

  ## Launching the Server

  ### NVIDIA — TP8 (8x H200 / H20)

  ```bash
  vllm serve MiniMaxAI/MiniMax-M3 \
    --tensor-parallel-size 8 \
    --block-size 128 \
    --tool-call-parser minimax_m3 \
    --reasoning-parser minimax_m3 \
    --enable-auto-tool-choice
  ```

  #### TP8 + Expert Parallel

  ```bash
  vllm serve MiniMaxAI/MiniMax-M3 \
    --tensor-parallel-size 8 \
    --enable-expert-parallel \
    --block-size 128 \
    --tool-call-parser minimax_m3 \
    --reasoning-parser minimax_m3 \
    --enable-auto-tool-choice
  ```

  #### DP8 + Expert Parallel

  ```bash
  vllm serve MiniMaxAI/MiniMax-M3 \
    --data-parallel-size 8 \
    --enable-expert-parallel \
    --block-size 128 \
    --tool-call-parser minimax_m3 \
    --reasoning-parser minimax_m3 \
    --enable-auto-tool-choice
  ```

  ### AMD ROCm (MI350X/MI355X (gfx950), MI300X/MI325X (gfx942))

  On AMD MI300X / MI325X / MI355X, run with CUDA graphs and set the following
  before any of the serve commands below:

  ```bash
  export VLLM_USE_BREAKABLE_CUDAGRAPH=0   # CUDA graphs on; avoids the decode breakable-cudagraph path that forces eager (per @hongxiayang)
  export VLLM_ROCM_USE_AITER=1            # AITER kernels: hot decode GEMMs + fused MoE
  export VLLM_ROCM_USE_AITER_MHA=0        # keep MSA attention on TRITON_ATTN (MXFP8 lacks calibrated ROCm FP8 attn scales)
  export TORCH_BLAS_PREFER_HIPBLASLT=1
  export GPU_MAX_HW_QUEUES=2              # cap HIP streams below the default of 4
  ```

  Enabling AITER gives +5.6..+10.8% total tok/s/gpu on 8xMI300X (MXFP8, 1k1k random, conc 4..256); the runtime knobs are numerically inert.

  On **MI300X / MI325X (gfx942) only**, also raise the RCCL channel count for TP8 (the gfx942 default is ~32–64):

  ```bash
  export NCCL_MIN_NCHANNELS=112
  ```

  Leave this unset on gfx950 (MI350X/MI355X): RCCL already defaults to 112 channels for an 8-GPU node there, and setting `NCCL_MIN_NCHANNELS` explicitly bypasses RCCL's adaptive channel-tuning model (RCCL 2.26.6 / ROCm 7.0).

  For gfx950: Prefer using the MXFP8 variant `MiniMaxAI/MiniMax-M3-MXFP8` for TP=4 and a smaller
  footprint. Use TP=8 for lower latency or long context length, or the default bf16 model.

  #### TP8 (Text or Vision)

  ```bash
  vllm serve MiniMaxAI/MiniMax-M3 \
    --tensor-parallel-size 8 \
    --block-size 128 \
    --attention-backend TRITON_ATTN \
    --mm-encoder-tp-mode data \
    --mm-encoder-attn-backend ROCM_AITER_FA \
    --tool-call-parser minimax_m3 \
    --reasoning-parser minimax_m3 \
    --enable-auto-tool-choice
  ```

  #### TP8 + Expert Parallel

  ```bash
  vllm serve MiniMaxAI/MiniMax-M3 \
    --tensor-parallel-size 8 \
    --enable-expert-parallel \
    --block-size 128 \
    --attention-backend TRITON_ATTN \
    --mm-encoder-tp-mode data \
    --mm-encoder-attn-backend ROCM_AITER_FA \
    --tool-call-parser minimax_m3 \
    --reasoning-parser minimax_m3 \
    --enable-auto-tool-choice
  ```

  #### DP8 + Expert Parallel

  ```bash
  vllm serve MiniMaxAI/MiniMax-M3 \
    --data-parallel-size 8 \
    --enable-expert-parallel \
    --block-size 128 \
    --attention-backend TRITON_ATTN \
    --mm-encoder-tp-mode data \
    --mm-encoder-attn-backend ROCM_AITER_FA \
    --tool-call-parser minimax_m3 \
    --reasoning-parser minimax_m3 \
    --enable-auto-tool-choice
  ```

  ## FP8 KV Cache

  Add `--kv-cache-dtype fp8` to any command for ~1.5× the KV pool — lossless
  in our testing across the full native context. Especially worth it for high
  concurrency or long context, where KV is the binding constraint.

  ## Context Length & GPU Memory

  The full **1M-token** window (`context_length: 1048576`) needs a large KV
  cache. To save GPU memory, you can optionally cap the context with
  `--max-model-len`:

  ```bash
  vllm serve MiniMaxAI/MiniMax-M3 \
    --tensor-parallel-size 8 \
    --block-size 128 \
    --max-model-len 131072        # 128K instead of the full 1M
  ```

  AMD ROCm notes: Native context is 512K. To go past it, supply a YaRN rope_scaling on the text config
  (a top-level override silently misses the decoder's config) and allow the long max length.
  TP=8 + fp8 KV is the practical combo at 1M:

  ```bash
  VLLM_ALLOW_LONG_MAX_MODEL_LEN=1 \
    vllm serve MiniMaxAI/MiniMax-M3 \
    --block-size 128 \
    --kv-cache-dtype fp8 \
    --tensor-parallel-size 8 \
    --max-model-len 1048576 \
    --attention-backend TRITON_ATTN \
    --mm-encoder-tp-mode data \
    --mm-encoder-attn-backend ROCM_AITER_FA \
    --tool-call-parser minimax_m3 \
    --enable-auto-tool-choice \
    --reasoning-parser minimax_m3 \
    --hf-overrides '{"text_config":{"rope_scaling":{"rope_type":"yarn","factor":2.0,"original_max_position_embeddings":524288}}}'
  ```

  - Set `--max-model-len` to the longest prompt + output you actually serve
    (e.g. `32768`, `131072`, `262144`). A smaller window frees KV-pool headroom
    for higher concurrency and lets the model fit on fewer GPUs; if you need the
    full 1M window, consider scaling out with multi-node TP instead.

  ## Client Usage

  Recommended sampling parameters (from the model card):

  - `temperature = 1.0`
  - `top_p = 0.95`
  - `top_k = 40`

  Default system prompt:

  ```
  You are a helpful assistant. Your name is MiniMax-M3 and is built by MiniMax.
  ```

  Example chat request:

  ```bash
  curl http://localhost:8000/v1/chat/completions \
    -H "Content-Type: application/json" \
    -d '{
      "model": "MiniMaxAI/MiniMax-M3",
      "temperature": 1.0,
      "top_p": 0.95,
      "messages": [
        {"role": "system", "content": "You are a helpful assistant. Your name is MiniMax-M3 and is built by MiniMax."},
        {"role": "user", "content": "Explain MSA sparse attention in 3 bullets."}
      ]
    }'
  ```

  ## Thinking Modes

  M3 reasoning is controlled by the `thinking_mode`, there are three values:

  - **`enabled`** — the model thinks before every response, including after tool results. 
    Use for complex reasoning and agents.
  - **`disabled`** — no thinking; the model answers directly. Use for
    latency-sensitive turns.
  - **`adaptive`** *(default when unset)* — the model decides whether to think
    based on the task.

  Pass it per request through `chat_template_kwargs`. The same value also tunes
  the `minimax_m3` reasoning parser, so `reasoning_content` and `content` are
  split correctly in every mode.

  ```python

  # Start the MiniMax-M3 model by referring to the command above first.
  
  from openai import OpenAI

  client = OpenAI(api_key="EMPTY", base_url="http://localhost:8000/v1")

  response = client.chat.completions.create(
      model="MiniMaxAI/MiniMax-M3",
      messages=[{"role": "user", "content": "Prove there are infinitely many primes."}],
      extra_body={"chat_template_kwargs": {"thinking_mode": "enabled"}},
  )
  msg = response.choices[0].message
  # vLLM exposes the <mm:think> block as `reasoning` (the older
  # `reasoning_content` field is deprecated but still aliased).
  print(getattr(msg, "reasoning", None) or getattr(msg, "reasoning_content", None))
  print(msg.content)  # the final answer
  ```

  ## Benchmarking

  ```bash
  vllm bench serve \
    --backend vllm \
    --model MiniMaxAI/MiniMax-M3 \
    --endpoint /v1/completions \
    --dataset-name random \
    --random-input 2048 \
    --random-output 1024 \
    --max-concurrency 10 \
    --num-prompt 100
  ```

  ## Quantized Variant (MXFP8)

  [`MiniMaxAI/MiniMax-M3-MXFP8`](https://huggingface.co/MiniMaxAI/MiniMax-M3-MXFP8)
  is an MXFP8 checkpoint quantized by NVIDIA from the original FP16 weights —
  roughly half the VRAM of the BF16 release. Select the **mxfp8** variant above,
  or pass the repo id directly to `vllm serve`:

  ```bash
  vllm serve MiniMaxAI/MiniMax-M3-MXFP8 \
    --tensor-parallel-size 8 \
    --block-size 128 \
    --tool-call-parser minimax_m3 \
    --reasoning-parser minimax_m3 \
    --enable-auto-tool-choice
  ```

  For best MXFP8 throughput, prefer Blackwell (B200/B300) for native MX tensor cores,
  or AMD CDNA4 (MI350X/MI355X, gfx950) for native MXFP8 matrix cores.

  ## Quantized Variant (MXFP4 on MI355X)

  [`amd/MiniMax-M3-MXFP4`](https://huggingface.co/amd/MiniMax-M3-MXFP4)
  uses static OCP MXFP4 weights and dynamic OCP MXFP4 activations produced with
  AMD Quark. It targets AMD Instinct MI355X (gfx950) and requires a ROCm
  nightly containing the Quark MXFP4 fix from vLLM PR #45794.

  Select the **mxfp4** variant and **MI355X** hardware in the command builder,
  or launch the tested TP8 baseline directly:

  ```bash
  vllm serve amd/MiniMax-M3-MXFP4 \
    --tensor-parallel-size 8 \
    --trust-remote-code \
    --block-size 128 \
    --attention-backend TRITON_ATTN \
    --mm-encoder-tp-mode data \
    --mm-encoder-attn-backend ROCM_AITER_FA \
    --tool-call-parser minimax_m3 \
    --enable-auto-tool-choice \
    --reasoning-parser minimax_m3
  ```

  ## Troubleshooting

  - **`--block-size` mismatch.** MSA's sparse block size is 128; the vLLM KV
    cache block size must match. Using the default (16) misaligns the sparse
    attention indexing (on AMD it crashes with `No common block size for 16`).
  - **Parsers.** `--tool-call-parser` and `--reasoning-parser` both use
    `minimax_m3` — distinct from `minimax_m2` used by earlier releases.
  - **Long context KV cache.** See *Context Length & GPU Memory* above — cap
    `--max-model-len` or scale to multi-node TP if you OOM.
  - **Vision encoder.** The encoder is small, so at high TP the *Encoder
    Parallel* option runs it data-parallel (`--mm-encoder-tp-mode data`) to
    avoid TP comm overhead; it also turns on the vision-encoder attention
    backend (FlashInfer on NVIDIA, `--mm-encoder-attn-backend FLASHINFER`;
    AITER FlashAttention on AMD, `ROCM_AITER_FA`) and the host-shared-memory
    multimodal processor cache (`--mm-processor-cache-type shm`). For **text-only** workloads enable *Text only*
    (`--language-model-only`) to skip loading the encoder and free VRAM — it is
    mutually exclusive with Encoder Parallel.
 

  ## References

  - [Model card](https://huggingface.co/MiniMaxAI/MiniMax-M3)
  - [MXFP8 variant](https://huggingface.co/MiniMaxAI/MiniMax-M3-MXFP8)
  - [AMD MXFP4 variant](https://huggingface.co/amd/MiniMax-M3-MXFP4)
  - [MiniMax](https://www.minimax.io/)
  - [MiniMax Agent](https://agent.minimax.io/)
  - [MiniMax Platform](https://platform.minimax.io/)
  - [Previous release: MiniMax-M2.7](https://huggingface.co/MiniMaxAI/MiniMax-M2.7)
