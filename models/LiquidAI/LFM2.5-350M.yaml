  context_length: 128000
  base_args: []
  base_env: {}

features:
  tool_calling:
    description: "Surface LFM2.5's Pythonic tool calls (wrapped in <|tool_call_start|>…<|tool_call_end|>) as OpenAI tool_calls via vLLM's native lfm2 parser"
