meta:
  title: "DeepSeek-V4-Pro"
  slug: "deepseek-v4-pro"
  provider: "DeepSeek"
  description: "DeepSeek V4 flagship MoE (1.6T total / 49B active) with hybrid CSA+HCA attention, manifold-constrained hyper-connections, Muon-trained on 32T+ tokens, and three-tier reasoning."
  date_updated: 2026-04-24
  difficulty: hard
  tasks:
    - text
  performance_headline: "Frontier 1.6T/49B reasoning MoE with native FP4+FP8 weights, MTP speculative decoding, and 1M-token context"
  related_recipes: []
  hardware:
    h200: verified
    b200: verified
    gb200: verified
    b300: verified
    gb300: verified
    mi300x: unsupported
    mi325x: unsupported
    mi355x: unsupported

model:
  model_id: "deepseek-ai/DeepSeek-V4-Pro"
  min_vllm_version: "0.20.0"
  architecture: moe
  parameter_count: "1600B"
  active_parameters: "49B"
  context_length: 1048576
  flashinfer_autotune: true
  base_args:
    - "--trust-remote-code"
    - "--kv-cache-dtype"
    - "fp8"
    - "--block-size"
    - "256"
  base_env:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"

dependencies:
  - note: "DeepGEMM FP8 kernels — install via vLLM tools/install_deepgemm.sh"
    command: "bash <(curl -fsSL https://raw.githubusercontent.com/vllm-project/vllm/main/tools/install_deepgemm.sh)"

features:
  tool_calling:
    description: "Enable tool calling with DeepSeek V4 chat template support."
    args:
      - "--tokenizer-mode"
      - "deepseek_v4"
      - "--tool-call-parser"
      - "deepseek_v4"
      - "--enable-auto-tool-choice"
  reasoning:
    description: "Enable reasoning/thinking mode with the DeepSeek V4 reasoning parser."
    args:
      - "--reasoning-parser"
      - "deepseek_v4"
  spec_decoding:
    description: "Multi-Token Prediction speculative decoding with 2 speculative tokens."
    args:
      - "--speculative_config"
      - '{"method":"mtp","num_speculative_tokens":2}'

opt_in_features:
  - spec_decoding

variants:
  default:
    precision: fp8
    vram_minimum_gb: 960
    description: "Native FP4+FP8 mixed checkpoint (MoE experts FP4, remaining params FP8)"

compatible_strategies:
  - single_node_tp
  - single_node_tep
  - single_node_dep
  - multi_node_tep
  - multi_node_dep
  - pd_cluster

# TP+EP is the default deployment; single_node_tp is offered only as a
# latency-oriented alternative.
default_strategy: single_node_tep

hardware_overrides:
  hopper:
    # H200 (141 GB × 8 = 1128 GB) leaves KV cache tight at 1M context with
    # ~960 GB mixed-precision weights replicated across DP ranks — cap to 800K.
    extra_args:
      - "--max-model-len"
      - "800000"
      - "--gpu-memory-utilization"
      - "0.95"
      - "--max-num-seqs"
      - "512"
      - "--max-num-batched-tokens"
      - "512"
      - "--no-enable-flashinfer-autotune"
      - "--compilation-config"
      - '{"mode": 0, "cudagraph_mode": "FULL_DECODE_ONLY"}'
    extra_env:
      VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "0"
  blackwell:
    extra_args:
      - "--attention_config.use_fp4_indexer_cache=True"
      - "--moe-backend"
      - "deep_gemm_mega_moe"

strategy_overrides:
  single_node_tp:
    # Latency-oriented TP-only deployment: no expert parallelism (single_node_tp
    # strategy doesn't add --enable-expert-parallel) and no MoE mega-kernel
    # backend on Blackwell. Autotune is disabled to minimize startup time.
    extra_args:
      - "--no-enable-flashinfer-autotune"
    hardware_overrides:
      blackwell:
        # Replaces recipe-level blackwell override: keeps the FP4 indexer cache
        # but drops --moe-backend deep_gemm_mega_moe (TP-only path uses the
        # default MoE backend).
        extra_args:
          - "--attention_config.use_fp4_indexer_cache=True"
  single_node_tep:
    extra_args:
      - "--compilation-config"
      - '{"cudagraph_mode":"FULL_AND_PIECEWISE", "custom_ops":["all"]}'
  multi_node_tep:
    extra_args:
      - "--compilation-config"
      - '{"cudagraph_mode":"FULL_AND_PIECEWISE", "custom_ops":["all"]}'
  single_node_dep:
    extra_args:
      - "--compilation-config"
      - '{"cudagraph_mode":"FULL_AND_PIECEWISE", "custom_ops":["all"]}'
  multi_node_dep:
    extra_args:
      - "--compilation-config"
      - '{"cudagraph_mode":"FULL_AND_PIECEWISE", "custom_ops":["all"]}'
  pd_cluster:
    env:
      VLLM_USE_NCCL_SYMM_MEM: "1"
      NCCL_CUMEM_ENABLE: "1"
      NCCL_MNNVL_ENABLE: "1"
      NCCL_NVLS_ENABLE: "1"
    prefill:
      nodes:
        default: 2           # 2 GB200 NVL4 trays = 8 GPUs (~960 GB weights don't fit on 1 tray)
        gb300: 1             # 1 GB300 NVL4 tray = 4 GPUs (1072 GB/tray fits weights)
      parallelism: dep       # DP + expert-parallel pool
      vllm_args:
        - "--enforce-eager"
        - "--max-num-seqs"
        - "2"
        - "--max-num-batched-tokens"
        - "16384"
        - "--no-disable-hybrid-kv-cache-manager"
        - "--enable-sleep-mode"
      env: {}
    decode:
      nodes:
        default: 2           # 2 GB200 NVL4 trays = 8 GPUs
        gb300: 1             # 1 GB300 NVL4 tray = 4 GPUs
      parallelism: dep
      vllm_args:
        - "--max-num-seqs"
        - "1024"
        - "--max-num-batched-tokens"
        - "1024"
        - "--max-cudagraph-capture-size"
        - "1024"
        - "--compilation-config"
        - '{"cudagraph_mode":"FULL_DECODE_ONLY"}'
        - "--no-disable-hybrid-kv-cache-manager"
        - "--enable-sleep-mode"
      env: {}

guide: |
  ## Overview

  DeepSeek-V4-Pro is the flagship of the V4 preview family: a 1.6T-total / 49B-active
  Mixture-of-Experts model. It pairs a **hybrid attention stack** — Compressed Sparse
  Attention (CSA) + Heavily Compressed Attention (HCA) — with **Manifold-Constrained
  Hyper-Connections (mHC)** to reach 27% of V3.2's per-token inference FLOPs and 10% of
  V3.2's KV cache at 1M context. Pre-trained on 32T+ tokens with the **Muon optimizer**
  for faster convergence; post-training is a two-stage pipeline (domain-specific expert
  cultivation + unified consolidation via on-policy distillation).

  Checkpoint is **FP4+FP8 mixed**: MoE expert weights are stored in FP4 while the
  remaining (attention / norm / router) params stay in FP8.

  ## Reasoning modes

  The chat template exposes three reasoning-effort modes:

  - **Non-think** — fast, intuitive responses.
  - **Think High** — explicit chain-of-thought for complex problem-solving and planning.
  - **Think Max** — maximum reasoning effort; requires `--max-model-len >= 393216`
    (384K tokens) to avoid truncation.

  Recommended sampling: `temperature = 1.0`, `top_p = 1.0`.

  ### OpenAI Client Example

  For DeepSeek-V4, keep reasoning controls in `chat_template_kwargs`, as it exposes a
  custom **Think Max** mode via `"reasoning_effort": "max"`.

  ```python
  from openai import OpenAI

  client = OpenAI(base_url="http://localhost:8000/v1", api_key="EMPTY")
  model = "deepseek-ai/DeepSeek-V4-Pro"
  messages = [{"role": "user", "content": "What is 17*19? Return only the final integer."}]

  # Non-think
  resp = client.chat.completions.create(
      model=model,
      messages=messages,
  )

  # Think High
  resp = client.chat.completions.create(
      model=model,
      messages=messages,
      extra_body={
          "chat_template_kwargs": {
              "thinking": True,
              "reasoning_effort": "high",
          },
      },
  )

  # Think Max
  resp = client.chat.completions.create(
      model=model,
      messages=messages,
      extra_body={
          "chat_template_kwargs": {
              "thinking": True,
              "reasoning_effort": "max",
          },
      },
  )
  ```

  ## Recommended deployments

  - **B300 (8× GPU)**: single-node DP + EP with `--data-parallel-size 8`.
  - **H200 (8× GPU)**: DP + EP with `--data-parallel-size 8`. Context is capped at
    800K tokens (`--max-model-len 800000`) to leave KV headroom with dense params
    replicated across ranks — applies to both single-node and multi-node H200.
  - **GB200 NVL4 (4× GPU per tray)**: the ~960 GB mixed-precision checkpoint does not
    fit on one tray; run multi-node DP + EP across **2 trays** (8 GPUs total) with
    `--data-parallel-size 8`. Pick the "Multi-Node" tab and set nodes to 2.
