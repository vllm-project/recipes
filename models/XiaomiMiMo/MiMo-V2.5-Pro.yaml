meta:
  title: "MiMo-V2.5-Pro"
  slug: "mimo-v2-5-pro"
  provider: "Xiaomi MiMo"
  description: "Xiaomi's flagship MoE reasoning model (~1T total / ~45B active) with hybrid attention, native FP8 weights, and Multi-Token Prediction"
  date_updated: 2026-04-27
  difficulty: advanced
  tasks:
    - text
  related_recipes:
    - "XiaomiMiMo/MiMo-V2-Flash"
  hardware:
    h200: verified

model:
  model_id: "XiaomiMiMo/MiMo-V2.5-Pro"
  min_vllm_version: "0.11.0"
  architecture: moe
  parameter_count: "1T"
  active_parameters: "45B"
  context_length: 1048576
  base_args:
    - "--trust-remote-code"
    - "--generation-config"
    - "vllm"
  base_env: {}

features:
  tool_calling:
    description: "MiMo tool-call parser"
    args:
      - "--tool-call-parser"
      - "mimo"
      - "--enable-auto-tool-choice"
  reasoning:
    description: "MiMo reasoning parser"
    args:
      - "--reasoning-parser"
      - "mimo"
  spec_decoding:
    description: "Multi-Token Prediction"
    args:
      - "--speculative-config"
      - '{"method":"mtp","num_speculative_tokens":1}'

opt_in_features:
  - spec_decoding

variants:
  default:
    precision: fp8
    vram_minimum_gb: 1229
    description: "Native FP8 weights (block-wise e4m3 128x128); 8x H200 with TP8"
    extra_args:
      - "--tensor-parallel-size"
      - "8"
      - "--gpu-memory-utilization"
      - "0.95"
      - "--max-model-len"
      - "auto"

compatible_strategies:
  - single_node_tp
  - single_node_tep
  - multi_node_tp
  - multi_node_tep
  - multi_node_dep

hardware_overrides: {}
strategy_overrides: {}

guide: |
  ## Overview

  MiMo-V2.5-Pro is Xiaomi's flagship MoE reasoning model with ~1T total parameters
  and ~45B active per token. It uses 384 routed experts (top-8) with hybrid
  attention (full-attention + sliding-window 128) over 70 layers and ships with
  native FP8 (block-wise e4m3) weights. A Multi-Token Prediction (MTP) head is
  included for future speculative decoding.

  ## Prerequisites

  - Hardware: 8x H200 (TP8) — KV cache headroom is tight; raise nodes for long contexts
  - vLLM >= 0.11.0

  ### Install vLLM

  ```bash
  uv venv
  source .venv/bin/activate
  uv pip install vllm --torch-backend auto
  ```

  ## Launch commands

  Single-node TP8 (H200):

  ```bash
  vllm serve XiaomiMiMo/MiMo-V2.5-Pro \
    --tensor-parallel-size 8 \
    --trust-remote-code \
    --gpu-memory-utilization 0.95 \
    --max-model-len auto \
    --generation-config vllm
  ```

  With tool calling + reasoning:

  ```bash
  vllm serve XiaomiMiMo/MiMo-V2.5-Pro \
    --tensor-parallel-size 8 \
    --trust-remote-code \
    --gpu-memory-utilization 0.95 \
    --max-model-len auto \
    --reasoning-parser mimo \
    --tool-call-parser mimo \
    --enable-auto-tool-choice \
    --generation-config vllm
  ```

  DP + TP + EP:

  ```bash
  vllm serve XiaomiMiMo/MiMo-V2.5-Pro \
    --data-parallel-size 2 \
    --tensor-parallel-size 8 \
    --enable-expert-parallel \
    --trust-remote-code \
    --gpu-memory-utilization 0.95 \
    --generation-config vllm
  ```

  Tunable flags:
  - `--max-model-len` — full context is 1,048,576; use `auto` to size to KV budget.
  - `--max-num-batched-tokens=32768` for prompt-heavy workloads; lower for latency.
  - `--gpu-memory-utilization=0.95` to maximize KV cache (weights occupy ~1.04 TB).

  ## Client Usage

  ```bash
  curl -X POST http://localhost:8000/v1/chat/completions \
    -H "Content-Type: application/json" \
    -d '{
      "model": "XiaomiMiMo/MiMo-V2.5-Pro",
      "messages": [{"role": "user", "content": "Hello MiMo!"}],
      "chat_template_kwargs": {"enable_thinking": true}
    }'
  ```

  Set `"enable_thinking": false` (or omit the kwargs) to disable thinking mode.

  ## Benchmarking

  ```bash
  vllm bench serve \
    --model XiaomiMiMo/MiMo-V2.5-Pro \
    --dataset-name random --random-input-len 8000 --random-output-len 1000 \
    --request-rate 3 --num-prompts 1800 --ignore-eos
  ```

  ## References

  - [MiMo-V2.5-Pro on Hugging Face](https://huggingface.co/XiaomiMiMo/MiMo-V2.5-Pro)
