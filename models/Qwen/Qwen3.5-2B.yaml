meta:
  title: "Qwen3.5-2B"
  slug: "qwen3.5-2b"
  provider: "Qwen"
  description: "Qwen3.5 mini dense multimodal model (2B) — edge / low-VRAM serving with 262K context"
  date_updated: 2026-04-22
  difficulty: beginner
  tasks:
    - multimodal
    - text
  performance_headline: "Edge-scale Qwen3.5 dense — fits on 8 GB GPUs"
  related_recipes:
    - "Qwen/Qwen3.5-4B"
    - "Qwen/Qwen3.5-0.8B"

model:
  model_id: "Qwen/Qwen3.5-2B"
  min_vllm_version: "0.17.0"
  architecture: dense
  parameter_count: "2B"
  active_parameters: "2B"
  context_length: 262144
  base_args:
    - "--trust-remote-code"
  base_env: {}

features:
  tool_calling:
    description: "Enable automatic tool choice with Qwen3 Coder parser"
    args:
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_coder"
  reasoning:
    description: "Enable chain-of-thought reasoning with Qwen3 parser"
    args:
      - "--reasoning-parser"
      - "qwen3"
  spec_decoding:
    description: "Multi-token prediction speculative decoding for lower latency"
    args:
      - "--speculative-config"
      - '{"method":"mtp","num_speculative_tokens":1}'
  text_only:
    description: "Skip loading the vision encoder for text-only workloads."
    args:
      - "--language-model-only"

opt_in_features:
  - spec_decoding
  - text_only

variants:
  default:
    precision: bf16
    vram_minimum_gb: 5
    description: "Full precision BF16 — fits on an 8 GB GPU"

compatible_strategies:
  - single_node_tp

hardware_overrides: {}

strategy_overrides: {}

guide: |
  ## Overview

  [Qwen3.5-2B](https://huggingface.co/Qwen/Qwen3.5-2B) is a miniature dense
  Qwen3.5 model — the full gated delta networks architecture, vision encoder,
  and 262K context, in a form small enough for 8 GB consumer GPUs or edge
  inference.

  ## Prerequisites

  - **vLLM version:** >= 0.17.0
  - **Hardware:** single 8 GB GPU

  ### Install vLLM

  ```bash
  uv venv
  source .venv/bin/activate
  uv pip install -U vllm --torch-backend=auto
  ```

  ## Launching the Server

  ```bash
  vllm serve Qwen/Qwen3.5-2B \
    --max-model-len 262144 \
    --reasoning-parser qwen3
  ```

  ## Client Usage

  ```python
  from openai import OpenAI

  client = OpenAI(api_key="EMPTY", base_url="http://localhost:8000/v1")
  resp = client.chat.completions.create(
      model="Qwen/Qwen3.5-2B",
      messages=[{"role": "user", "content": "Hi!"}],
      max_tokens=64,
  )
  print(resp.choices[0].message.content)
  ```

  ## References

  - [Model card](https://huggingface.co/Qwen/Qwen3.5-2B)
  - [Base checkpoint](https://huggingface.co/Qwen/Qwen3.5-2B-Base)
