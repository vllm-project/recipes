meta:
  title: "Qwen3.5-9B"
  slug: "qwen3.5-9b"
  provider: "Qwen"
  description: "Qwen3.5 dense multimodal model (9B) with gated delta networks hybrid attention, MTP, and 262K context"
  date_updated: 2026-04-22
  difficulty: beginner
  tasks:
    - multimodal
    - text
  performance_headline: "Single-GPU Qwen3.5 dense with MTP-accelerated decoding"
  related_recipes:
    - "Qwen/Qwen3.5-27B"
    - "Qwen/Qwen3.5-4B"

model:
  model_id: "Qwen/Qwen3.5-9B"
  min_vllm_version: "0.17.0"
  architecture: dense
  parameter_count: "9B"
  active_parameters: "9B"
  context_length: 262144
  base_args:
    - "--trust-remote-code"
  base_env: {}

features:
  tool_calling:
    description: "Enable automatic tool choice with Qwen3 Coder parser"
    args:
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_coder"
  reasoning:
    description: "Enable chain-of-thought reasoning with Qwen3 parser"
    args:
      - "--reasoning-parser"
      - "qwen3"
  spec_decoding:
    description: "Multi-token prediction speculative decoding for lower latency"
    args:
      - "--speculative-config"
      - '{"method":"mtp","num_speculative_tokens":1}'
  text_only:
    description: "Skip loading the vision encoder for text-only workloads — frees VRAM for KV cache."
    args:
      - "--language-model-only"

opt_in_features:
  - spec_decoding
  - text_only

variants:
  default:
    precision: bf16
    vram_minimum_gb: 22
    description: "Full precision BF16 — single 24 GB GPU"

compatible_strategies:
  - single_node_tp
  - multi_node_tp

hardware_overrides: {}

strategy_overrides: {}

guide: |
  ## Overview

  [Qwen3.5-9B](https://huggingface.co/Qwen/Qwen3.5-9B) is a dense multimodal
  model from the Qwen3.5 family — same gated delta networks hybrid attention,
  vision encoder, 262K context, and MTP support as its larger siblings, but
  sized to fit comfortably on a single 24 GB GPU.

  ## Prerequisites

  - **vLLM version:** >= 0.17.0
  - **Hardware:** single 24 GB GPU (RTX 4090 / L4 / A10G / H100)

  ### Install vLLM

  ```bash
  uv venv
  source .venv/bin/activate
  uv pip install -U vllm --torch-backend=auto
  ```

  ## Launching the Server

  ### Single-GPU BF16

  ```bash
  vllm serve Qwen/Qwen3.5-9B \
    --max-model-len 262144 \
    --reasoning-parser qwen3
  ```

  ### MTP speculative decoding

  ```bash
  vllm serve Qwen/Qwen3.5-9B \
    --speculative-config '{"method": "mtp", "num_speculative_tokens": 1}' \
    --reasoning-parser qwen3
  ```

  ## Client Usage

  ```python
  from openai import OpenAI

  client = OpenAI(api_key="EMPTY", base_url="http://localhost:8000/v1")
  resp = client.chat.completions.create(
      model="Qwen/Qwen3.5-9B",
      messages=[{"role": "user", "content": "Hello!"}],
      max_tokens=128,
  )
  print(resp.choices[0].message.content)
  ```

  ## Troubleshooting

  - **CUDA graph / Mamba cache size error:** reduce `--max-cudagraph-capture-size`
    (default 512). See [vLLM PR #34571](https://github.com/vllm-project/vllm/pull/34571).
  - **Disable reasoning:** add `--default-chat-template-kwargs '{"enable_thinking": false}'`.

  ## References

  - [Model card](https://huggingface.co/Qwen/Qwen3.5-9B)
  - [Base checkpoint](https://huggingface.co/Qwen/Qwen3.5-9B-Base)
