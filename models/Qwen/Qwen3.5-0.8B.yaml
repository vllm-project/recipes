meta:
  title: "Qwen3.5-0.8B"
  slug: "qwen3.5-0.8b"
  provider: "Qwen"
  description: "Qwen3.5 tiny dense multimodal model (0.8B) — ultra-low-VRAM / edge serving with 262K context"
  date_updated: 2026-04-22
  difficulty: beginner
  tasks:
    - multimodal
    - text
  performance_headline: "Tiny Qwen3.5 dense for edge / draft-model use"
  related_recipes:
    - "Qwen/Qwen3.5-2B"

model:
  model_id: "Qwen/Qwen3.5-0.8B"
  min_vllm_version: "0.17.0"
  architecture: dense
  parameter_count: "0.8B"
  active_parameters: "0.8B"
  context_length: 262144
  base_args:
    - "--trust-remote-code"
  base_env: {}

features:
  tool_calling:
    description: "Enable automatic tool choice with Qwen3 Coder parser"
    args:
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_coder"
  reasoning:
    description: "Enable chain-of-thought reasoning with Qwen3 parser"
    args:
      - "--reasoning-parser"
      - "qwen3"
  text_only:
    description: "Skip loading the vision encoder for text-only workloads."
    args:
      - "--language-model-only"

opt_in_features:
  - text_only

variants:
  default:
    precision: bf16
    vram_minimum_gb: 2
    description: "Full precision BF16 — runs on any modern GPU"

compatible_strategies:
  - single_node_tp

hardware_overrides: {}

strategy_overrides: {}

guide: |
  ## Overview

  [Qwen3.5-0.8B](https://huggingface.co/Qwen/Qwen3.5-0.8B) is the smallest
  member of the Qwen3.5 family — same hybrid gated delta networks architecture
  and 262K context, at a size suited to edge devices or as a draft model for
  speculative decoding with larger Qwen3.5 checkpoints.

  ## Prerequisites

  - **vLLM version:** >= 0.17.0
  - **Hardware:** any modern GPU (>=4 GB VRAM)

  ### Install vLLM

  ```bash
  uv venv
  source .venv/bin/activate
  uv pip install -U vllm --torch-backend=auto
  ```

  ## Launching the Server

  ```bash
  vllm serve Qwen/Qwen3.5-0.8B \
    --max-model-len 262144 \
    --reasoning-parser qwen3
  ```

  ## Client Usage

  ```python
  from openai import OpenAI

  client = OpenAI(api_key="EMPTY", base_url="http://localhost:8000/v1")
  resp = client.chat.completions.create(
      model="Qwen/Qwen3.5-0.8B",
      messages=[{"role": "user", "content": "Hi!"}],
      max_tokens=64,
  )
  print(resp.choices[0].message.content)
  ```

  ## References

  - [Model card](https://huggingface.co/Qwen/Qwen3.5-0.8B)
  - [Base checkpoint](https://huggingface.co/Qwen/Qwen3.5-0.8B-Base)
