meta:
  title: "Qwen3.6-27B"
  slug: "Qwen3.6-27b"
  provider: "Qwen"
  description: "Qwen3.6 dense multimodal model (27B) with gated delta networks hybrid attention, MTP, and 262K context"
  date_updated: 2026-07-02
  difficulty: beginner
  tasks:
    - multimodal
    - text
  performance_headline: "Qwen3.6 flagship dense — single-GPU FP8 or 2x GPU BF16"
  related_recipes:
    - "Qwen/Qwen3.6-35B-A3B"
  hardware:
    dgx_spark_gb10: verified
    rtx_pro_6000: verified
    dgx_station_gb300: verified

model:
  model_id: "Qwen/Qwen3.6-27B"
  min_vllm_version: "0.17.0"
  architecture: dense
  parameter_count: "27B"
  active_parameters: "27B"
  context_length: 262144
  base_args:
    - "--trust-remote-code"
  base_env: {}

features:
  tool_calling:
    description: "Enable automatic tool choice with Qwen3 XML parser"
    args:
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_xml"
  reasoning:
    description: "Enable chain-of-thought reasoning with Qwen3 parser"
    args:
      - "--reasoning-parser"
      - "qwen3"
  spec_decoding:
    description: "Multi-token prediction speculative decoding for lower latency"
    args:
      - "--speculative-config"
      - '{"method":"mtp","num_speculative_tokens":3}'
  text_only:
    description: "Skip loading the vision encoder for text-only workloads — frees VRAM for KV cache. Mutually exclusive with encoder_parallel."
    args:
      - "--language-model-only"
  encoder_parallel:
    description: "Run the vision encoder in data-parallel mode — avoids TP comm overhead on the small encoder. Mutually exclusive with text_only."
    args:
      - "--mm-encoder-tp-mode"
      - "data"

opt_in_features:
  - spec_decoding
  - text_only

variants:
  default:
    precision: bf16
    vram_minimum_gb: 65
    description: "Full precision BF16 — fits on 1x H200 or 2x H100"
    hardware_overrides:
      rtx_pro_6000:
        extra_args:
          - "--max-num-seqs"
          - "8"
  fp8:
    model_id: "Qwen/Qwen3.6-27B-FP8"
    precision: fp8
    vram_minimum_gb: 33
    description: "Qwen official FP8 checkpoint — single 40 GB GPU"
    extra_args:
      - "--max-num-seqs"
      - "512"
    hardware_overrides:
      dgx_spark_gb10:
        extra_env:
          VLLM_USE_DEEP_GEMM: "0"
      rtx_pro_6000:
        extra_env:
          VLLM_USE_DEEP_GEMM: "0"
  nvfp4:
    model_id: "nvidia/Qwen3.6-27B-NVFP4"
    precision: nvfp4
    vram_minimum_gb: 27
    tp: 1
    description: "NVIDIA ModelOpt NVFP4 checkpoint — MLP linears quantized to NVFP4, attention linears and KV cache in FP8. Single Blackwell GPU, including DGX Spark."
    hardware_overrides:
      dgx_station_gb300:
        extra_args:
          - "--kv-cache-dtype"
          - "fp8"
          - "--attention-backend"
          - "flashinfer"
          - "--gpu-memory-utilization"
          - "0.92"
          - "--max-model-len"
          - "262144"
          - "--max-num-batched-tokens"
          - "8192"
          - "--enable-chunked-prefill"
          - "--enable-prefix-caching"
          - "--load-format"
          - "fastsafetensors"
          - "--async-scheduling"

compatible_strategies:
  - single_node_tp
  - multi_node_tp

hardware_overrides: {}

strategy_overrides: {}

guide: |
  ## Overview

  [Qwen3.6-27B](https://huggingface.co/Qwen/Qwen3.6-27B) is the flagship dense
  model of the Qwen3.6 family. It uses the same gated delta networks hybrid
  attention as its MoE siblings, supports vision+text input, and natively serves
  262K context. MTP (multi-token prediction) is supported out of the box for
  low-latency decoding.

  ## Prerequisites

  - **vLLM version:** >= 0.17.0
  - **DGX Spark NVFP4 vLLM version:** >= 0.24.0
  - **Hardware (BF16):** 1x H200 or 2x H100
  - **Hardware (FP8):** single 40 GB GPU (H100/H200/L40S)
  - **Hardware (Int4):** single 24 GB GPU
  - **Hardware (NVFP4):** single NVIDIA Blackwell GPU (B200/B300/GB10 DGX Spark)

  ### Install vLLM

  ```bash
  uv venv
  source .venv/bin/activate
  uv pip install -U vllm --torch-backend=auto
  ```

  ## Launching the Server

  ### Single-GPU FP8

  ```bash
  vllm serve Qwen/Qwen3.6-27B-FP8 \
    --max-model-len 262144 \
    --reasoning-parser qwen3
  ```

  ### BF16 on 2xH100 (TP2)

  ```bash
  vllm serve Qwen/Qwen3.6-27B \
    --tensor-parallel-size 2 \
    --max-model-len 262144 \
    --reasoning-parser qwen3
  ```

  ### MTP speculative decoding

  ```bash
  vllm serve Qwen/Qwen3.6-27B-FP8 \
    --speculative-config '{"method": "mtp", "num_speculative_tokens": 1}' \
    --reasoning-parser qwen3
  ```

  ### Text-only (skip vision encoder)

  ```bash
  vllm serve Qwen/Qwen3.6-27B-FP8 \
    --language-model-only \
    --reasoning-parser qwen3 \
    --enable-prefix-caching
  ```

  ### DGX Spark GB10 NVFP4

  The NVIDIA ModelOpt NVFP4 checkpoint is served from
  [`nvidia/Qwen3.6-27B-NVFP4`](https://huggingface.co/nvidia/Qwen3.6-27B-NVFP4)
  and requires vLLM 0.24.0+.

  ```bash
  # Use container: vllm/vllm-openai:v0.24.0-ubuntu2404

  vllm serve nvidia/Qwen3.6-27B-NVFP4 \
    --trust-remote-code \
    --kv-cache-dtype fp8 \
    --gpu-memory-utilization 0.5 \
    --max-model-len 262144 \
    --max-num-seqs 8 \
    --max-num-batched-tokens 8192 \
    --enable-chunked-prefill \
    --async-scheduling \
    --enable-prefix-caching \
    --speculative-config '{"method":"mtp","num_speculative_tokens":3}' \
    --load-format fastsafetensors \
    --reasoning-parser qwen3 \
    --tool-call-parser qwen3_xml \
    --enable-auto-tool-choice
  ```

  ### RTX Pro 6000 NVFP4

  The NVIDIA ModelOpt NVFP4 checkpoint is served from
  [`nvidia/Qwen3.6-27B-NVFP4`](https://huggingface.co/nvidia/Qwen3.6-27B-NVFP4)
  and requires vLLM 0.24.0+.

  ```bash
  # Use container: vllm/vllm-openai:v0.24.0-ubuntu2404

  vllm serve nvidia/Qwen3.6-27B-NVFP4 \
    --trust-remote-code \
    --kv-cache-dtype fp8 \
    --gpu-memory-utilization 0.9 \
    --max-model-len 262144 \
    --max-num-seqs 8 \
    --max-num-batched-tokens 8192 \
    --enable-chunked-prefill \
    --async-scheduling \
    --enable-prefix-caching \
    --speculative-config '{"method":"mtp","num_speculative_tokens":3}' \
    --load-format fastsafetensors \
    --reasoning-parser qwen3 \
    --tool-call-parser qwen3_xml \
    --enable-auto-tool-choice
  ```

  ### NVFP4 on Blackwell

  The [`nvidia/Qwen3.6-27B-NVFP4`](https://huggingface.co/nvidia/Qwen3.6-27B-NVFP4)
  checkpoint is NVIDIA's ModelOpt re-quantization: MLP linears drop to NVFP4
  (W4A16) while the attention linears and KV cache stay FP8, so the ~22 GB
  weights fit a single Blackwell GPU. vLLM auto-detects the ModelOpt
  quantization from the checkpoint, so no `--quantization` flag is needed — just
  use a recent vLLM (NVIDIA recommends nightly or a source build with ModelOpt
  W4A16/NVFP4 support). NVIDIA reports near-lossless accuracy versus the FP8
  baseline.

  ```bash
  vllm serve nvidia/Qwen3.6-27B-NVFP4 \
    --max-model-len 262144 \
    --reasoning-parser qwen3
  ```

  ## Processing Ultra-Long Texts

  Qwen3.6-27B natively supports `262,144` tokens. For longer inputs, apply
  YaRN RoPE scaling via `--hf-overrides` and raise `--max-model-len`. Pick
  `factor` to match your real workload — `2.0` covers ~524K, `4.0` covers
  ~1M — since YaRN at higher factors degrades short-context quality.

  ```bash
  VLLM_ALLOW_LONG_MAX_MODEL_LEN=1 vllm serve Qwen/Qwen3.6-27B-FP8 \
    --tensor-parallel-size 2 \
    --max-model-len 1010000 \
    --reasoning-parser qwen3 \
    --hf-overrides '{"text_config": {"rope_parameters": {"mrope_interleaved": true, "mrope_section": [11, 11, 10], "rope_type": "yarn", "rope_theta": 10000000, "partial_rotary_factor": 0.25, "factor": 4.0, "original_max_position_embeddings": 262144}}}'
  ```

  See the [model card](https://huggingface.co/Qwen/Qwen3.6-27B#processing-ultra-long-texts) for the full parameter reference.

  ## Client Usage

  ```python
  from openai import OpenAI

  client = OpenAI(api_key="EMPTY", base_url="http://localhost:8000/v1")
  resp = client.chat.completions.create(
      model="Qwen/Qwen3.6-27B",
      messages=[{"role": "user", "content": "Write a haiku about gated delta networks."}],
      max_tokens=256,
  )
  print(resp.choices[0].message.content)
  ```

  ## Troubleshooting

  - **CUDA graph / Mamba cache size error:** reduce `--max-cudagraph-capture-size`
    (default 512). See [vLLM PR #34571](https://github.com/vllm-project/vllm/pull/34571).
  - **Disable reasoning:** add `--default-chat-template-kwargs '{"enable_thinking": false}'`.
  - **Prefix Caching (Mamba):** currently experimental in "align" mode.

  ## References

