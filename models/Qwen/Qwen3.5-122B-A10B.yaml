meta:
  title: "Qwen3.5-122B-A10B"
  slug: "qwen3.5-122b-a10b"
  provider: "Qwen"
  description: "Mid-size Qwen3.5 multimodal MoE (122B total / 10B active) with gated delta networks, 256 experts, and 262K context"
  date_updated: 2026-04-22
  difficulty: intermediate
  tasks:
    - multimodal
    - text
  performance_headline: "Qwen3.5 mid-tier MoE — fits on 4x H200 BF16 or 2x H200 FP8"
  related_recipes:
    - "Qwen/Qwen3.5-397B-A17B"
    - "Qwen/Qwen3.5-35B-A3B"

model:
  model_id: "Qwen/Qwen3.5-122B-A10B"
  min_vllm_version: "0.17.0"
  architecture: moe
  parameter_count: "122B"
  active_parameters: "10B"
  context_length: 262144
  base_args:
    - "--trust-remote-code"
  base_env: {}

features:
  tool_calling:
    description: "Enable automatic tool choice with Qwen3 Coder parser"
    args:
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_coder"
  reasoning:
    description: "Enable chain-of-thought reasoning with Qwen3 parser"
    args:
      - "--reasoning-parser"
      - "qwen3"
  spec_decoding:
    description: "Multi-token prediction speculative decoding for lower latency"
    args:
      - "--speculative-config"
      - '{"method":"mtp","num_speculative_tokens":1}'
  text_only:
    description: "Skip loading the vision encoder for text-only workloads — frees VRAM for KV cache. Mutually exclusive with encoder_parallel."
    args:
      - "--language-model-only"
  encoder_parallel:
    description: "Run the vision encoder in data-parallel mode — avoids TP comm overhead on the small encoder. Mutually exclusive with text_only."
    args:
      - "--mm-encoder-tp-mode"
      - "data"

opt_in_features:
  - spec_decoding
  - text_only

variants:
  default:
    precision: bf16
    vram_minimum_gb: 293
    description: "Full precision BF16 — requires 4x H200 or equivalent"
  fp8:
    model_id: "Qwen/Qwen3.5-122B-A10B-FP8"
    precision: fp8
    vram_minimum_gb: 147
    description: "Qwen official FP8 checkpoint — fits on 2x H200"
  gptq_int4:
    model_id: "Qwen/Qwen3.5-122B-A10B-GPTQ-Int4"
    precision: int4
    vram_minimum_gb: 74
    description: "GPTQ Int4 checkpoint — single-GPU serving on 80GB hardware"

compatible_strategies:
  - single_node_tp
  - single_node_tep
  - single_node_dep
  - multi_node_tp
  - multi_node_dep
  - multi_node_tep

hardware_overrides: {}

strategy_overrides: {}

guide: |
  ## Overview

  [Qwen3.5-122B-A10B](https://huggingface.co/Qwen/Qwen3.5-122B-A10B) is a mid-tier
  member of the Qwen3.5 family, sharing the gated delta networks MoE architecture
  with 122B total parameters and 10B activated per token (256 experts). It is
  multimodal (vision + text) and natively supports 262K context.

  ## Prerequisites

  - **vLLM version:** >= 0.17.0
  - **Hardware (BF16):** 4x H200 or 8x H100
  - **Hardware (FP8):** 2x H200 or 4x H100
  - **Hardware (Int4):** single 80 GB GPU

  ### Install vLLM

  ```bash
  uv venv
  source .venv/bin/activate
  uv pip install -U vllm --torch-backend=auto
  ```

  ## Launching the Server

  ### BF16 on 4xH200 (TP4)

  ```bash
  vllm serve Qwen/Qwen3.5-122B-A10B \
    --tensor-parallel-size 4 \
    --max-model-len 262144 \
    --reasoning-parser qwen3
  ```

  ### FP8 on 2xH200 (TP2)

  ```bash
  vllm serve Qwen/Qwen3.5-122B-A10B-FP8 \
    --tensor-parallel-size 2 \
    --max-model-len 262144 \
    --reasoning-parser qwen3
  ```

  ### Throughput-focused (text-only, EP)

  ```bash
  vllm serve Qwen/Qwen3.5-122B-A10B-FP8 \
    -dp 4 --enable-expert-parallel \
    --language-model-only \
    --reasoning-parser qwen3 \
    --enable-prefix-caching
  ```

  ### MTP speculative decoding

  ```bash
  vllm serve Qwen/Qwen3.5-122B-A10B-FP8 \
    --tensor-parallel-size 2 \
    --speculative-config '{"method": "mtp", "num_speculative_tokens": 1}' \
    --reasoning-parser qwen3
  ```

  ## Client Usage

  ```python
  from openai import OpenAI

  client = OpenAI(api_key="EMPTY", base_url="http://localhost:8000/v1")
  resp = client.chat.completions.create(
      model="Qwen/Qwen3.5-122B-A10B",
      messages=[{"role": "user", "content": "Summarize the gated delta networks paper."}],
      max_tokens=512,
  )
  print(resp.choices[0].message.content)
  ```

  ## Troubleshooting

  - **CUDA graph / Mamba cache size error:** reduce `--max-cudagraph-capture-size`
    (default 512). See [vLLM PR #34571](https://github.com/vllm-project/vllm/pull/34571).
  - **Disable reasoning:** add `--default-chat-template-kwargs '{"enable_thinking": false}'`.
  - **Prefix Caching (Mamba):** currently experimental in "align" mode.

  ## References

  - [Model card](https://huggingface.co/Qwen/Qwen3.5-122B-A10B)
  - [FP8 checkpoint](https://huggingface.co/Qwen/Qwen3.5-122B-A10B-FP8)
  - [GPTQ-Int4 checkpoint](https://huggingface.co/Qwen/Qwen3.5-122B-A10B-GPTQ-Int4)
  - [Qwen3.5-397B-A17B recipe](../Qwen3.5-397B-A17B)
