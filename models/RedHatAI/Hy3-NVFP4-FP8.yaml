meta:
  title: "Hy3-NVFP4-FP8"
  slug: "hy3-nvfp4-fp8"
  provider: "Red Hat AI"
  description: "RedHatAI's mixed-precision quantization of Tencent Hy3 — MoE layers in NVFP4, attention layers in FP8 block — near-full accuracy recovery at half the GPU footprint"
  date_updated: 2026-07-17
  difficulty: intermediate
  tasks:
    - text
  performance_headline: "Hy3 NVFP4-FP8 — 295B/21B MoE on 4×H100/H200 instead of 8, with near-full accuracy"
  related_recipes:
    - "tencent/Hy3"
  hardware: {}

model:
  model_id: "RedHatAI/Hy3-NVFP4-FP8"
  min_vllm_version: "0.26.0"
  docker_image:
    nvidia: "vllm/vllm-openai:hy3"
  nightly_required: true
  install:
    docker:
      note: "Use the dedicated hy3 image until changes land in vllm:latest."
    pip:
      note: "Requires a vLLM build with Hy3 support (nightly or source). See the tencent/Hy3 recipe for build-from-source instructions."
  architecture: moe
  parameter_count: "295B"
  active_parameters: "21B"
  context_length: 262144
  base_args: []
  base_env: {}

features:
  tool_calling:
    description: "Hy v3 tool call parser with automatic tool choice"
    args:
      - "--tool-call-parser"
      - "hy_v3"
      - "--enable-auto-tool-choice"
  reasoning:
    description: "Hy v3 reasoning parser for thinking-mode chain-of-thought extraction"
    args:
      - "--reasoning-parser"
      - "hy_v3"
  spec_decoding:
    description: "Multi-Token Prediction speculative decoding using the model's built-in MTP layer"
    args:
      - "--speculative-config"
      - '{"method":"mtp","num_speculative_tokens":2}'

opt_in_features:
  - spec_decoding

variants:
  default:
    precision: nvfp4
    vram_minimum_gb: 214
    description: "Mixed-precision — MoE experts in NVFP4, attention layers in FP8 block. Fits a single 4-GPU node (4×H100 80GB / 4×H200)."

compatible_strategies:
  - single_node_tp
  - single_node_tep
  - single_node_dep
  - multi_node_tp
  - multi_node_tep
  - multi_node_dep

hardware_overrides:
  hopper:
    extra_env:
      VLLM_FLASHINFER_ALLREDUCE_BACKEND: "trtllm"
  blackwell:
    extra_env:
      VLLM_FLASHINFER_ALLREDUCE_BACKEND: "trtllm"

strategy_overrides: {}

guide: |
  # Hy3-NVFP4-FP8 Usage Guide

  [RedHatAI/Hy3-NVFP4-FP8](https://huggingface.co/RedHatAI/Hy3-NVFP4-FP8) is a
  mixed-precision quantized variant of [Tencent Hy3](https://huggingface.co/tencent/Hy3)
  produced by Red Hat AI using
  [LLM Compressor](https://github.com/vllm-project/llm-compressor). It applies NVFP4
  quantization to the MoE feed-forward layers and FP8 block quantization to the attention
  layers, cutting the memory footprint roughly in half while maintaining near-full
  accuracy recovery.

  The base Hy3 architecture: 295B total parameters, 21B activated per token, 80
  transformer layers, 192 routed experts (top-8) + 1 shared expert, GQA with 64 heads
  over 8 KV heads, 256K context.

  ## Key Advantage

  The BF16 Hy3 checkpoint requires 8 high-memory GPUs (8×H200 or 8×H20-3e). This
  NVFP4-FP8 checkpoint fits on **4 GPUs** — halving the hardware requirement while
  preserving model quality.

  ## Setup

  ### Using Docker

  ```bash
  docker run --gpus all \
    -p 8000:8000 \
    --ipc=host \
    -e VLLM_FLASHINFER_ALLREDUCE_BACKEND=trtllm \
    -v ~/.cache/huggingface:/root/.cache/huggingface \
    vllm/vllm-openai:hy3 RedHatAI/Hy3-NVFP4-FP8 \
      --tensor-parallel-size 4 \
      --tool-call-parser hy_v3 \
      --reasoning-parser hy_v3 \
      --enable-auto-tool-choice \
      --served-model-name hy3-nvfp4-fp8
  ```

  ### Installing from source

  ```bash
  uv venv --python 3.12 --seed --managed-python
  source .venv/bin/activate
  git clone https://github.com/vllm-project/vllm.git
  cd vllm
  uv pip install --editable . --torch-backend=auto
  ```

  ## Model Deployment

  ### Serving on 4×H100 80GB or 4×H200

  ```bash
  export VLLM_FLASHINFER_ALLREDUCE_BACKEND=trtllm
  vllm serve RedHatAI/Hy3-NVFP4-FP8 \
    --tensor-parallel-size 4 \
    --tool-call-parser hy_v3 \
    --reasoning-parser hy_v3 \
    --enable-auto-tool-choice \
    --served-model-name hy3-nvfp4-fp8
  ```

  ### Serving on 8 GPUs (extra headroom)

  If more GPUs are available, TP=8 leaves additional memory for larger KV caches and
  higher concurrency:

  ```bash
  export VLLM_FLASHINFER_ALLREDUCE_BACKEND=trtllm
  vllm serve RedHatAI/Hy3-NVFP4-FP8 \
    --tensor-parallel-size 8 \
    --tool-call-parser hy_v3 \
    --reasoning-parser hy_v3 \
    --enable-auto-tool-choice \
    --served-model-name hy3-nvfp4-fp8
  ```

  ### With MTP (speculative decoding)

  The checkpoint includes a 7.5 GB MTP layer for Multi-Token Prediction:

  ```bash
  export VLLM_FLASHINFER_ALLREDUCE_BACKEND=trtllm
  vllm serve RedHatAI/Hy3-NVFP4-FP8 \
    --tensor-parallel-size 4 \
    --speculative-config.method mtp \
    --speculative-config.num_speculative_tokens 2 \
    --tool-call-parser hy_v3 \
    --reasoning-parser hy_v3 \
    --enable-auto-tool-choice \
    --served-model-name hy3-nvfp4-fp8
  ```

  ## Sampling and Reasoning Modes

  Tencent's recommended sampling parameters: `temperature=0.9`, `top_p=1.0`.

  Reasoning is controlled via `chat_template_kwargs.reasoning_effort`:

  | Value | Behavior |
  |:---|:---|
  | `no_think` (default) | Direct response, no chain-of-thought |
  | `low` | Light reasoning |
  | `high` | Deep chain-of-thought for math/coding/complex reasoning |

  When tools are registered, set `interleaved_thinking: true` to allow the model to
  think between tool calls.

  ### OpenAI Client Example

  ```python
  from openai import OpenAI

  client = OpenAI(base_url="http://localhost:8000/v1", api_key="EMPTY")
  messages = [
      {"role": "system", "content": "You are a helpful assistant."},
      {"role": "user", "content": "Hello."},
  ]

  # Direct response (default).
  resp = client.chat.completions.create(
      model="hy3-nvfp4-fp8",
      messages=messages,
      temperature=0.9,
      top_p=1.0,
      max_tokens=4096,
  )
  print(resp.choices[0].message.content)

  # Deep reasoning.
  resp_think = client.chat.completions.create(
      model="hy3-nvfp4-fp8",
      messages=messages,
      temperature=0.9,
      top_p=1.0,
      max_tokens=4096,
      extra_body={
        "chat_template_kwargs": {
            "reasoning_effort": "high",
            "interleaved_thinking": True,
        },
      },
  )
  output_msg = resp_think.choices[0].message
  print(output_msg.reasoning_content)  # chain-of-thought
  print(output_msg.content)             # final answer
  ```

  ## Benchmarking

  For benchmarking, disable prefix caching by adding `--no-enable-prefix-caching` to
  the server command:

  ```bash
  vllm bench serve \
    --model RedHatAI/Hy3-NVFP4-FP8 \
    --dataset-name random \
    --random-input-len 8192 \
    --random-output-len 1024 \
    --max-concurrency 32 \
    --num-prompts 160 \
    --served-model-name hy3-nvfp4-fp8
  ```

  ## Troubleshooting

  - **Out of memory on 4 GPUs**: Reduce `--gpu-memory-utilization` (default 0.90) or
    reduce `--max-model-len` to limit KV cache. Alternatively, move to TP=8.
  - **MTP not working**: Ensure the `model_mtp.safetensors` file downloaded with the
    checkpoint. If speculative decoding causes issues, remove the `--speculative-config`
    flags and serve without MTP.

  ## References

  - [RedHatAI/Hy3-NVFP4-FP8 model card](https://huggingface.co/RedHatAI/Hy3-NVFP4-FP8)
  - [Base model — tencent/Hy3](https://huggingface.co/tencent/Hy3)
  - [vLLM Hy3 recipe](https://recipes.vllm.ai/tencent/Hy3)
  - [GitHub: Tencent-Hunyuan/Hy3](https://github.com/Tencent-Hunyuan/Hy3)
