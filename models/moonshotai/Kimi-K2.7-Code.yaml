meta:
  title: "Kimi-K2.7-Code"
  slug: "kimi-k2.7-code"
  provider: "Moonshot AI"
  description: "Coding-focused agentic MoE built on Kimi-K2.6, tuned for long-horizon software-engineering tasks with thinking-only reasoning, tool calling, and vision-language input"
  date_updated: 2026-07-13
  difficulty: intermediate
  tasks:
    - multimodal
    - text
  performance_headline: "1T MoE coding agent with ~30% fewer thinking tokens than Kimi-K2.6"
  related_recipes:
    - "moonshotai/Kimi-K2.6"
    - "moonshotai/Kimi-K2-Thinking"
  hardware:
    h200: verified
    mi300x: verified
    mi325x: verified
    mi355x: verified

model:
  model_id: "moonshotai/Kimi-K2.7-Code"
  min_vllm_version: "0.19.1"
  docker_image:
    nvidia: "vllm/vllm-openai:latest"
    amd: "vllm/vllm-openai-rocm:nightly"
  architecture: moe
  parameter_count: "1T"
  active_parameters: "32B"
  context_length: 262144
  supports_dcp: true
  base_args:
    - "--trust-remote-code"
  base_env: {}

dependencies: []

features:
  tool_calling:
    description: "Kimi K2 tool-call parser with automatic tool choice"
    args:
      - "--tool-call-parser"
      - "kimi_k2"
      - "--enable-auto-tool-choice"
  reasoning:
    description: "Kimi K2 reasoning parser for extracting chain-of-thought content (Kimi-K2.7-Code is thinking-only — keep this enabled)"
    args:
      - "--reasoning-parser"
      - "kimi_k2"
  text_only:
    description: "Skip loading the vision encoder for text-only workloads — frees VRAM for KV cache. Mutually exclusive with encoder_parallel."
    args:
      - "--language-model-only"
  encoder_parallel:
    description: "Run the vision encoder in data-parallel mode — avoids TP comm overhead on the small encoder. Mutually exclusive with text_only."
    args:
      - "--mm-encoder-tp-mode"
      - "data"

opt_in_features:
  - text_only

variants:
  default:
    precision: int4
    vram_minimum_gb: 714
    description: "Native INT4 via compressed-tensors (~595 GB on disk); fits 8×H200"
  mxfp4:
    model_id: "amd/Kimi-K2.7-Code-MXFP4"
    precision: mxfp4
    # 1T total params × 0.5 bytes (MXFP4) × 1.2 headroom = 600 GB.
    vram_minimum_gb: 600
    description: "AMD Quark OCP MXFP4 weights for MI350X/MI355X (gfx950); fits 8× MI355X."
    supported_hardware:
      - mi355x
    hardware_overrides:
      mi355x:
        docker_image: "vllm/vllm-openai-rocm:v0.24.0"
        extra_args:
          - "--block-size"
          - "1"
        extra_env:
          VLLM_ROCM_USE_AITER: "1"
          VLLM_ROCM_QUICK_REDUCE_QUANTIZATION: "INT4"

compatible_strategies:
  - single_node_tp
  - single_node_tep
  - single_node_dep
  - multi_node_tp
  - multi_node_tp_pp
  - multi_node_dep
  - multi_node_tep
  - pd_cluster

hardware_overrides:
  blackwell:
    extra_args:
      - "--attention-config.use_trtllm_ragged_deepseek_prefill=True"
  amd:
    # Verified on 8× MI300X / MI355X (MI325X listed as supported but not verified).
    extra_env:
      VLLM_ROCM_USE_AITER: "1"
      VLLM_ROCM_QUICK_REDUCE_QUANTIZATION: "INT4"

strategy_overrides: {}

guide: |
  ## Overview

  [Kimi-K2.7-Code](https://huggingface.co/moonshotai/Kimi-K2.7-Code) is a coding-focused
  agentic model built on top of Kimi-K2.6. It substantially improves real-world
  long-horizon coding performance — strengthening end-to-end task completion across complex
  software-engineering workflows while improving token efficiency, reducing thinking-token
  usage by ~30% versus Kimi-K2.6.

  It shares the same architecture as Kimi-K2.5 / Kimi-K2.6 (1T-parameter MoE, 32B activated,
  DeepSeek-V3 backbone with MLA attention and a MoonViT vision encoder), so the K2.6
  deployment method can be reused directly. Kimi-K2.7-Code runs in **thinking mode only**
  with `preserve_thinking` forced on; keep the reasoning parser enabled.

  ## Prerequisites

  - **vLLM version:** >= 0.19.1 (manually verified). The model is also available in the
    vLLM nightly wheel, but nightly builds are experimental.
  - **Hardware (INT4):** 8x H200 GPUs (verified), or equivalent aggregate VRAM (~640 GB)

  ```bash
  uv venv
  source .venv/bin/activate
  uv pip install -U vllm --torch-backend=auto
  ```

  ## Launch command

  Serve on a single H200 node with TP8 (vision encoder in data-parallel mode):

  ```bash
  vllm serve moonshotai/Kimi-K2.7-Code \
    --tensor-parallel-size 8 \
    --mm-encoder-tp-mode data \
    --trust-remote-code \
    --tool-call-parser kimi_k2 \
    --enable-auto-tool-choice \
    --reasoning-parser kimi_k2
  ```

  **Key notes**

  - `--tool-call-parser kimi_k2` — required for enabling tool calling.
  - `--reasoning-parser kimi_k2` — Kimi-K2.7-Code supports thinking mode only; pass this for
    correct reasoning processing.
  - `--mm-encoder-tp-mode data` — runs the small MoonViT encoder data-parallel to avoid TP
    communication overhead.

  ### AMD MI300X/MI325X

  On 8x MI300X or MI325X (`gfx942`), use the standard W4A16 MoE path with AITER
  and INT4 QuickReduce.

  ```bash
  export VLLM_ROCM_USE_AITER=1
  export VLLM_ROCM_QUICK_REDUCE_QUANTIZATION=INT4

  vllm serve moonshotai/Kimi-K2.7-Code \
    --host 0.0.0.0 \
    --port 8000 \
    --trust-remote-code \
    --tensor-parallel-size 8 \
    --tool-call-parser kimi_k2 \
    --enable-auto-tool-choice \
    --reasoning-parser kimi_k2 \
    --mm-encoder-tp-mode data
  ```

  ### AMD MI350X/MI355X

  On 8x MI350X or MI355X (`gfx950`), add `--moe-backend flydsl` to use the
  optimized FlyDSL W4A16 MoE kernel. Keep LoRA disabled for this path.

  ```bash
  export VLLM_ROCM_USE_AITER=1
  export VLLM_ROCM_QUICK_REDUCE_QUANTIZATION=INT4

  vllm serve moonshotai/Kimi-K2.7-Code \
    --tensor-parallel-size 8 \
    --trust-remote-code \
    --mm-encoder-tp-mode data \
    --moe-backend flydsl \
    --tool-call-parser kimi_k2 \
    --enable-auto-tool-choice \
    --reasoning-parser kimi_k2 \
    --compilation-config '{"pass_config": {"fuse_allreduce_rms": false}}'
  ```

  Notes:
  - The FlyDSL INT4 MoE path does not support expert parallelism; do not add
    `--enable-expert-parallel`.
  - Keep `--compilation-config '{"pass_config": {"fuse_allreduce_rms": false}}'`;
    it is required for this FlyDSL path on MI350X / MI355X.
  - vLLM has tuned MI350X/MI355X FlyDSL configs for this Kimi shape at TP=8 and TP=4.
  - Keep vLLM's default block size unless you are tuning long-context
    throughput; `--block-size 64` is safe to try.

  ### AMD MI355X — MXFP4 (`amd/Kimi-K2.7-Code-MXFP4`)

  AMD publishes an OCP **MXFP4** checkpoint quantized with
  [amd-quark](https://quark.docs.amd.com/) at
  [`amd/Kimi-K2.7-Code-MXFP4`](https://huggingface.co/amd/Kimi-K2.7-Code-MXFP4).
  Select the **mxfp4** variant and **MI355X** hardware in the command builder.
  This path uses the native MXFP4 MoE kernels (not FlyDSL) on the
  `vllm/vllm-openai-rocm:v0.24.0` image, and needs the quantization runtime
  installed inside the container (a manual step is currently required on ROCm
  vLLM):

  ```bash
  pip install amd-quark
  ```

  ```bash
  export VLLM_ROCM_USE_AITER=1
  export VLLM_ROCM_QUICK_REDUCE_QUANTIZATION=INT4
  # AITER RMSNorm has accuracy issues at TP<8 — disable it whenever TP<8.
  export VLLM_ROCM_USE_AITER_RMSNORM=0

  vllm serve amd/Kimi-K2.7-Code-MXFP4 \
    --tensor-parallel-size 4 \
    --trust-remote-code \
    --mm-encoder-tp-mode data \
    --block-size 1 \
    --gpu-memory-utilization 0.90 \
    --tool-call-parser kimi_k2 \
    --enable-auto-tool-choice \
    --reasoning-parser kimi_k2 \
    --enable-prefix-caching
  ```

  Notes:
  - `--block-size 1` is required for the MXFP4 MLA path on MI355X.
  - Set `VLLM_ROCM_USE_AITER_RMSNORM=0` whenever `TP < 8` (AITER RMSNorm
    accuracy issue); it can stay enabled at TP=8.
  - On MEC firmware < 177, export `HSA_NO_SCRATCH_RECLAIM=1` to avoid an RCCL
    memory-reclaim issue at engine init.
  - If engine init intermittently hangs in the symm-mem all-reduce rendezvous,
    export `VLLM_ALLREDUCE_USE_SYMM_MEM=0`.

  #### LMCache CPU KV offload (single node)

  For long-horizon agentic-coding workloads with heavy prefix reuse, offloading
  the KV cache to host DRAM via [LMCache](https://github.com/LMCache/LMCache)
  extends the effective cache far beyond GPU HBM. LMCache runs as a separate
  multi-process (MP) server that vLLM connects to through the
  `LMCacheMPConnector`.

  > vLLM's recipe command builder does not yet expose a first-class KV-offload
  > row (tracked upstream in
  > [vllm-project/recipes#628](https://github.com/vllm-project/recipes/pull/628)).
  > Until that lands, use the manual setup below.

  On ROCm, build the connector against HIP if it isn't already importable:

  ```bash
  python3 -c "import lmcache.integration.vllm.lmcache_mp_connector" 2>/dev/null || {
    git clone https://github.com/LMCache/LMCache.git /opt/lmcache-src
    cd /opt/lmcache-src && git checkout aaf7c0d3
    pip install -r requirements/build.txt
    CXX=hipcc BUILD_WITH_HIP=1 pip install -e . --no-build-isolation
  }
  ```

  Start the LMCache MP server (host-DRAM L1 tier). Size `--l1-size-gb` to the
  host DRAM you want to dedicate, but keep it **below** free `/dev/shm`: the L1
  tier is shared-memory backed and silently disables SHM (then crashes on load)
  if it exceeds available `/dev/shm`. A safe cap is ~90% of free `/dev/shm`.

  ```bash
  export PYTHONHASHSEED=0
  lmcache server \
    --host 127.0.0.1 --port 5555 \
    --http-host 127.0.0.1 --http-port 8080 \
    --l1-size-gb 512 \
    --l1-init-size-gb 20 \
    --l1-read-ttl-seconds 7200 \
    --chunk-size 256 \
    --max-workers 8 \
    --eviction-policy LRU &
  # Wait for http://127.0.0.1:8080/healthcheck to return 200 before starting vLLM.
  ```

  Then launch vLLM with the LMCache connector (drop `--enable-prefix-caching` —
  LMCache owns the cache in this mode):

  ```bash
  export PYTHONHASHSEED=0
  vllm serve amd/Kimi-K2.7-Code-MXFP4 \
    --tensor-parallel-size 4 \
    --trust-remote-code \
    --mm-encoder-tp-mode data \
    --block-size 1 \
    --gpu-memory-utilization 0.90 \
    --tool-call-parser kimi_k2 \
    --enable-auto-tool-choice \
    --reasoning-parser kimi_k2 \
    --kv-transfer-config '{"kv_connector":"LMCacheMPConnector","kv_connector_module_path":"lmcache.integration.vllm.lmcache_mp_connector","kv_role":"kv_both","kv_connector_extra_config":{"lmcache.mp.host":"tcp://127.0.0.1","lmcache.mp.port":5555}}'
  ```

  Notes:
  - `--max-workers` scales with TP — `2 × TP` is a good default (8 for TP4).
  - Set `PYTHONHASHSEED=0` on **both** the LMCache server and vLLM so chunk
    hashing is stable across processes.
  - Keep `--l1-size-gb` ≤ ~90% of free `/dev/shm`.

  ## Client Usage

  Once the vLLM server is running, consume it via the OpenAI-compatible API. The recommended
  sampling for thinking mode is `temperature=1.0` and `top_p=0.95`.

  ```python
  import time
  from openai import OpenAI

  client = OpenAI(
      api_key="EMPTY",
      base_url="http://localhost:8000/v1",
      timeout=3600,
  )

  messages = [
      {
          "role": "user",
          "content": [
              {
                  "type": "image_url",
                  "image_url": {
                      "url": "https://huggingface.co/moonshotai/Kimi-K2.7-Code/resolve/main/figures/kimi-logo.png"
                  },
              },
              {"type": "text", "text": "Describe this image in detail."},
          ],
      }
  ]

  start = time.time()
  response = client.chat.completions.create(
      model="moonshotai/Kimi-K2.7-Code",
      messages=messages,
      max_tokens=4096,
      temperature=1.0,
      top_p=0.95,
  )
  print(f"Response costs: {time.time() - start:.2f}s")
  print(f"Reasoning: {response.choices[0].message.reasoning}")
  print(f"Response: {response.choices[0].message.content}")
  ```

  ## Troubleshooting

  - **OOM errors:** Lower `--gpu-memory-utilization` or adjust TP/EP to match your GPU count.
  - **Vision encoder performance:** Use `--mm-encoder-tp-mode data` to run the vision encoder
    in data-parallel mode. The encoder is small, so TP adds communication overhead with little gain.
  - **Unique multimodal inputs:** Pass `--mm-processor-cache-gb 0` to avoid caching overhead.
    For repeated inputs, `--mm-processor-cache-type shm` uses host shared memory for better
    performance at high TP settings.
  - **Text-only workloads:** Pass `--language-model-only` to skip loading MoonViT and free
    VRAM for KV cache.

  ## References

  - [Kimi-K2.7-Code on Hugging Face](https://huggingface.co/moonshotai/Kimi-K2.7-Code)
  - [amd/Kimi-K2.7-Code-MXFP4 (MI355X)](https://huggingface.co/amd/Kimi-K2.7-Code-MXFP4)
  - [Kimi-K2.7-Code deployment guide](https://huggingface.co/moonshotai/Kimi-K2.7-Code/blob/main/docs/deploy_guidance.md)
  - [Kimi-K2.6 recipe](https://recipes.vllm.ai/moonshotai/Kimi-K2.6)
  - [LMCache](https://github.com/LMCache/LMCache)
  - [vLLM multimodal inputs guide](https://docs.vllm.ai/en/latest/features/multimodal_inputs.html)
