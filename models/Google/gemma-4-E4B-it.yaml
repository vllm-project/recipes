meta:
  title: "Gemma 4 E4B IT"
  slug: "gemma-4-e4b-it"
  provider: "Google"
  description: "Google's compact Gemma 4 multimodal model (effective 4B) with native text, image, and audio, plus thinking mode and tool-use protocol."
  date_updated: 2026-04-21
  difficulty: beginner
  tasks:
    - multimodal
    - text
  performance_headline: "Effective-4B unified multimodal model with audio, thinking, and function calling — runs on a single 24 GB+ GPU"
  related_recipes:
    - google/gemma-4-E2B-it
    - google/gemma-4-31B-it
    - google/gemma-4-26B-A4B-it
  hardware:
    h100: verified
    mi300x: verified
    mi325x: verified
    mi355x: verified
    trillium: verified
    ironwood: verified

model:
  model_id: "google/gemma-4-E4B-it"
  min_vllm_version: "0.19.1"
  docker_image:
    nvidia: "vllm/vllm-openai:gemma4"
    amd: "vllm/vllm-openai-rocm:gemma4"
  architecture: dense
  parameter_count: "8B"
  active_parameters: "8B"
  context_length: 131072
  base_args: []
  base_env: {}

dependencies:
  - note: "Audio extras — needed to serve the audio modality"
    command: 'uv pip install "vllm[audio]"'
    optional: true

features:
  tool_calling:
    description: "Enable automatic tool choice with Gemma 4 parser and chat template"
    args:
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "gemma4"
      - "--chat-template"
      - "examples/tool_chat_template_gemma4.jinja"
  reasoning:
    description: "Enable structured thinking/reasoning output"
    args:
      - "--reasoning-parser"
      - "gemma4"
  text_only:
    description: "Skip loading the vision and audio encoders for text-only workloads — frees VRAM for KV cache. Mutually exclusive with encoder_parallel."
    args:
      - "--language-model-only"

opt_in_features:
  - text_only

variants:
  default:
    precision: bf16
    vram_minimum_gb: 20
    description: "Full BF16 — single 24 GB+ NVIDIA GPU or 1x MI300X/MI325X/MI350X/MI355X"

compatible_strategies:
  - single_node_tp
  - multi_node_tp

hardware_overrides: {}

strategy_overrides:
  single_node_tp:
    tp: 1

guide: |
  ## Overview

  [Gemma 4 E4B](https://huggingface.co/google/gemma-4-E4B-it) is Google's effective-4B unified multimodal model — text + images + audio in a single model, with structured thinking/reasoning, function calling, and dynamic vision resolution. It fits on a single 24 GB+ GPU.

  ### Key Features
  - **Multimodal**: Text + images + audio natively (video via custom frame-extraction pipeline).
  - **Dual Attention**: Alternating sliding-window (local) and global attention with different head dimensions.
  - **Thinking Mode**: Structured reasoning via `<|channel>thought\n...<channel|>` delimiters.
  - **Function Calling**: Custom tool-call protocol with dedicated special tokens.
  - **Dynamic Vision Resolution**: Per-request configurable vision token budget (70, 140, 280, 560, 1120 tokens).

  TPU support is provided through [vLLM TPU](https://github.com/vllm-project/tpu-inference) with recipes for [Trillium](https://github.com/AI-Hypercomputer/tpu-recipes/tree/main/inference/trillium/vLLM/Gemma4) and [Ironwood](https://github.com/AI-Hypercomputer/tpu-recipes/blob/main/inference/ironwood/vLLM/Gemma4/).

  ## Prerequisites

  ### pip (NVIDIA CUDA)
  ```bash
  uv venv
  source .venv/bin/activate
  uv pip install -U vllm --pre \
    --extra-index-url https://wheels.vllm.ai/nightly/cu129 \
    --extra-index-url https://download.pytorch.org/whl/cu129 \
    --index-strategy unsafe-best-match
  ```

  ### pip (AMD ROCm: MI300X, MI325X, MI350X, MI355X)
  Requires Python 3.12, ROCm 7.2.1, glibc >= 2.35 (Ubuntu 22.04+).
  ```bash
  uv venv --python 3.12
  source .venv/bin/activate
  uv pip install vllm --pre \
    --extra-index-url https://wheels.vllm.ai/rocm/nightly/rocm721 --upgrade
  ```

  ### Docker
  ```bash
  docker pull vllm/vllm-openai:gemma4        # CUDA 12.9
  docker pull vllm/vllm-openai:gemma4-cu130  # CUDA 13.0
  docker pull vllm/vllm-openai-rocm:gemma4   # AMD
  ```

  ## Deployment Configurations

  ### Quick Start (Single GPU)
  ```bash
  vllm serve google/gemma-4-E4B-it \
    --max-model-len 32768
  ```

  ### With Audio Support
  ```bash
  vllm serve google/gemma-4-E4B-it \
    --max-model-len 8192 \
    --limit-mm-per-prompt image=4,audio=1
  ```

  ### Full-Featured Server Launch
  Enables text, image, audio, thinking, and tool calling:
  ```bash
  vllm serve google/gemma-4-E4B-it \
    --max-model-len 16384 \
    --gpu-memory-utilization 0.90 \
    --enable-auto-tool-choice \
    --reasoning-parser gemma4 \
    --tool-call-parser gemma4 \
    --chat-template examples/tool_chat_template_gemma4.jinja \
    --limit-mm-per-prompt image=4,audio=1 \
    --async-scheduling \
    --host 0.0.0.0 \
    --port 8000
  ```

  ### Docker (NVIDIA)
  ```bash
  docker run -itd --name gemma4-e4b \
    --ipc=host --network host --shm-size 16G --gpus all \
    -v ~/.cache/huggingface:/root/.cache/huggingface \
    vllm/vllm-openai:gemma4 \
      --model google/gemma-4-E4B-it \
      --max-model-len 32768 \
      --host 0.0.0.0 --port 8000
  ```

  ### Docker (AMD MI300X/MI325X/MI350X/MI355X)
  ```bash
  docker run -itd --name gemma4-rocm \
    --ipc=host --network=host --privileged \
    --cap-add=CAP_SYS_ADMIN --device=/dev/kfd --device=/dev/dri \
    --group-add=video --cap-add=SYS_PTRACE \
    --security-opt=seccomp=unconfined --shm-size 16G \
    -v ~/.cache/huggingface:/root/.cache/huggingface \
    vllm/vllm-openai-rocm:gemma4 \
      --model google/gemma-4-E4B-it \
      --host 0.0.0.0 --port 8000
  ```

  ### Docker (Cloud TPU — Trillium / Ironwood)
  TPU uses the separate `vllm/vllm-tpu` image (no pip wheel). Pull the tag specified by the upstream [Trillium](https://github.com/AI-Hypercomputer/tpu-recipes/tree/main/inference/trillium/vLLM/Gemma4) or [Ironwood](https://github.com/AI-Hypercomputer/tpu-recipes/blob/main/inference/ironwood/vLLM/Gemma4/) recipe, then run:
  ```bash
  docker run -itd --name gemma4-tpu \
    --privileged --network host --shm-size 16G \
    -v /dev/shm:/dev/shm -e HF_TOKEN=$HF_TOKEN \
    vllm/vllm-tpu:latest \
      --model google/gemma-4-E4B-it \
      --max-model-len 16384 \
      --disable_chunked_mm_input \
      --host 0.0.0.0 --port 8000
  ```

  ## Client Usage

  ### Audio Transcription
  ```python
  from openai import OpenAI
  client = OpenAI(base_url="http://localhost:8000/v1", api_key="EMPTY")
  response = client.chat.completions.create(
      model="google/gemma-4-E4B-it",
      messages=[{"role": "user", "content": [
          {"type": "audio_url", "audio_url": {"url": "https://example.com/audio.wav"}},
          {"type": "text", "text": "Transcribe this audio."},
      ]}],
      max_tokens=512,
  )
  print(response.choices[0].message.content)
  ```

  ### Image Understanding
  ```python
  response = client.chat.completions.create(
      model="google/gemma-4-E4B-it",
      messages=[{"role": "user", "content": [
          {"type": "image_url", "image_url": {"url": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Cat03.jpg/1200px-Cat03.jpg"}},
          {"type": "text", "text": "Describe this image in detail."},
      ]}],
      max_tokens=1024,
  )
  ```

  ### Thinking Mode
  ```bash
  vllm serve google/gemma-4-E4B-it \
    --max-model-len 16384 \
    --reasoning-parser gemma4 \
    --tool-call-parser gemma4 \
    --enable-auto-tool-choice \
    --chat-template examples/tool_chat_template_gemma4.jinja
  ```
  Enable per-request via `extra_body={"chat_template_kwargs": {"enable_thinking": True}}`.

  ## Configuration Tips

  - Set `--max-model-len` to match your workload (max 131072).
  - Image-only workloads: `--limit-mm-per-prompt audio=0`.
  - Text-only workloads: `--limit-mm-per-prompt image=0,audio=0` to skip MM profiling.
  - `--async-scheduling` improves throughput.
  - FP8 KV cache (`--kv-cache-dtype fp8`) saves ~50% KV memory.

  ## References

  - [Model card](https://huggingface.co/google/gemma-4-E4B-it)
  - [Gemma docs](https://ai.google.dev/gemma/docs)
  - [vLLM Gemma 4 tool-call template](https://github.com/vllm-project/vllm/blob/main/examples/tool_chat_template_gemma4.jinja)
  - [TPU recipes: Trillium](https://github.com/AI-Hypercomputer/tpu-recipes/tree/main/inference/trillium/vLLM/Gemma4)
  - [TPU recipes: Ironwood](https://github.com/AI-Hypercomputer/tpu-recipes/blob/main/inference/ironwood/vLLM/Gemma4/)
