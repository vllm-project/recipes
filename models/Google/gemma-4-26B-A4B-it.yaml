meta:
  title: "Gemma 4 26B-A4B IT"
  slug: "gemma-4-26b-a4b-it"
  provider: "Google"
  description: "Google's Gemma 4 MoE multimodal model (26B total / 4B active) with 128 fine-grained experts, top-8 routing, thinking mode, and tool-use protocol."
  date_updated: 2026-04-21
  difficulty: intermediate
  tasks:
    - multimodal
    - text
  performance_headline: "MoE multimodal model — 26B total / 4B active, 128 experts with top-8 routing"
  related_recipes:
    - google/gemma-4-E2B-it
    - google/gemma-4-E4B-it
    - google/gemma-4-31B-it
  hardware:
    h100: verified
    h200: verified
    mi300x: verified
    mi325x: verified
    mi355x: verified
    trillium: verified
    ironwood: verified

model:
  model_id: "google/gemma-4-26B-A4B-it"
  min_vllm_version: "0.19.1"
  architecture: moe
  parameter_count: "26B"
  active_parameters: "4B"
  context_length: 131072
  base_args: []
  base_env: {}

dependencies: []
features:
  tool_calling:
    description: "Enable automatic tool choice with Gemma 4 parser and chat template"
    args:
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "gemma4"
      - "--chat-template"
      - "examples/tool_chat_template_gemma4.jinja"
  reasoning:
    description: "Enable structured thinking/reasoning output"
    args:
      - "--reasoning-parser"
      - "gemma4"
  text_only:
    description: "Skip loading the vision encoder for text-only workloads — frees VRAM for KV cache. Mutually exclusive with encoder_parallel."
    args:
      - "--language-model-only"

opt_in_features:
  - text_only

variants:
  default:
    precision: bf16
    vram_minimum_gb: 64
    description: "Full BF16 — single 80 GB NVIDIA GPU or 1x MI300X/MI325X/MI350X/MI355X"

compatible_strategies:
  - single_node_tp
  - single_node_tep
  - single_node_dep
  - multi_node_tp
  - multi_node_tep
  - multi_node_dep

hardware_overrides: {}

strategy_overrides:
  single_node_tp:
    tp: 1

guide: |
  ## Overview

  [Gemma 4 26B-A4B](https://huggingface.co/google/gemma-4-26B-A4B-it) is the Mixture-of-Experts member of Google's Gemma 4 family — 26B total parameters with only 4B active per token via 128 fine-grained experts and top-8 routing. It supports text + images natively, structured thinking, function calling, and dynamic vision resolution.

  ### Key Features
  - **MoE**: 128 fine-grained experts with top-8 routing and custom GELU-activated FFN.
  - **Multimodal**: Text + images natively (video via custom frame-extraction pipeline). Audio is only supported on the smaller E2B/E4B variants.
  - **Dual Attention**: Alternating sliding-window (local) and global attention with different head dimensions.
  - **Thinking Mode**: Structured reasoning via `<|channel>thought\n...<channel|>` delimiters.
  - **Function Calling**: Custom tool-call protocol with dedicated special tokens.
  - **Dynamic Vision Resolution**: Per-request configurable vision token budget (70, 140, 280, 560, 1120 tokens).

  TPU support is provided through [vLLM TPU](https://github.com/vllm-project/tpu-inference) with recipes for [Trillium](https://github.com/AI-Hypercomputer/tpu-recipes/tree/main/inference/trillium/vLLM/Gemma4) and [Ironwood](https://github.com/AI-Hypercomputer/tpu-recipes/blob/main/inference/ironwood/vLLM/Gemma4/).

  ## Prerequisites

  ### pip (NVIDIA CUDA)
  ```bash
  uv venv
  source .venv/bin/activate
  uv pip install -U vllm --pre \
    --extra-index-url https://wheels.vllm.ai/nightly/cu129 \
    --extra-index-url https://download.pytorch.org/whl/cu129 \
    --index-strategy unsafe-best-match
  ```

  ### pip (AMD ROCm: MI300X, MI325X, MI350X, MI355X)
  Requires Python 3.12, ROCm 7.2.1, glibc >= 2.35 (Ubuntu 22.04+).
  ```bash
  uv venv --python 3.12
  source .venv/bin/activate
  uv pip install vllm --pre \
    --extra-index-url https://wheels.vllm.ai/rocm/nightly/rocm721 --upgrade
  ```

  ### Docker
  ```bash
  docker pull vllm/vllm-openai:latest        # CUDA 12.9
  docker pull vllm/vllm-openai:latest-cu130  # CUDA 13.0
  docker pull vllm/vllm-openai-rocm:latest   # AMD
  ```
  TPU images are published separately by [vllm-project/tpu-inference](https://github.com/vllm-project/tpu-inference); see the Trillium / Ironwood tpu-recipes below for the pinned tag.

  ## Deployment Configurations

  ### 26B MoE on 1x A100/H100 (BF16)
  ```bash
  vllm serve google/gemma-4-26B-A4B-it \
    --max-model-len 32768 \
    --gpu-memory-utilization 0.90
  ```

  ### Full-Featured Server Launch
  Enables text, image, thinking, and tool calling:
  ```bash
  vllm serve google/gemma-4-26B-A4B-it \
    --max-model-len 16384 \
    --gpu-memory-utilization 0.90 \
    --enable-auto-tool-choice \
    --reasoning-parser gemma4 \
    --tool-call-parser gemma4 \
    --chat-template examples/tool_chat_template_gemma4.jinja \
    --limit-mm-per-prompt image=4 \
    --async-scheduling \
    --host 0.0.0.0 \
    --port 8000
  ```

  ### Docker (NVIDIA)
  ```bash
  docker run -itd --name gemma4-moe \
    --ipc=host --network host --shm-size 16G --gpus all \
    -v ~/.cache/huggingface:/root/.cache/huggingface \
    vllm/vllm-openai:latest \
      --model google/gemma-4-26B-A4B-it \
      --max-model-len 32768 \
      --gpu-memory-utilization 0.90 \
      --host 0.0.0.0 --port 8000
  ```

  ### Docker (AMD MI300X/MI325X/MI350X/MI355X)
  ```bash
  docker run -itd --name gemma4-rocm \
    --ipc=host --network=host --privileged \
    --cap-add=CAP_SYS_ADMIN --device=/dev/kfd --device=/dev/dri \
    --group-add=video --cap-add=SYS_PTRACE \
    --security-opt=seccomp=unconfined --shm-size 16G \
    -v ~/.cache/huggingface:/root/.cache/huggingface \
    vllm/vllm-openai-rocm:latest \
      --model google/gemma-4-26B-A4B-it \
      --host 0.0.0.0 --port 8000
  ```

  ### Docker (Cloud TPU — Trillium / Ironwood)
  TPU uses the separate `vllm/vllm-tpu` image (no pip wheel). Pull the tag specified by the upstream [Trillium](https://github.com/AI-Hypercomputer/tpu-recipes/tree/main/inference/trillium/vLLM/Gemma4) or [Ironwood](https://github.com/AI-Hypercomputer/tpu-recipes/blob/main/inference/ironwood/vLLM/Gemma4/) recipe, then run:
  ```bash
  docker run -itd --name gemma4-tpu \
    --privileged --network host --shm-size 16G \
    -v /dev/shm:/dev/shm -e HF_TOKEN=$HF_TOKEN \
    vllm/vllm-tpu:latest \
      --model google/gemma-4-26B-A4B-it \
      --tensor-parallel-size 8 \
      --max-model-len 16384 \
      --disable_chunked_mm_input \
      --host 0.0.0.0 --port 8000
  ```
  Trillium requires a 4-chip slice minimum; Ironwood runs on a single chip.

  ## Client Usage

  ### Text Generation
  ```python
  from openai import OpenAI
  client = OpenAI(base_url="http://localhost:8000/v1", api_key="EMPTY")
  response = client.chat.completions.create(
      model="google/gemma-4-26B-A4B-it",
      messages=[{"role": "user", "content": "Write a poem about the ocean."}],
      max_tokens=512, temperature=0.7,
  )
  print(response.choices[0].message.content)
  ```

  ### Image Understanding
  ```python
  response = client.chat.completions.create(
      model="google/gemma-4-26B-A4B-it",
      messages=[{"role": "user", "content": [
          {"type": "image_url", "image_url": {"url": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Cat03.jpg/1200px-Cat03.jpg"}},
          {"type": "text", "text": "Describe this image in detail."},
      ]}],
      max_tokens=1024,
  )
  ```

  ### Thinking Mode
  ```bash
  vllm serve google/gemma-4-26B-A4B-it \
    --max-model-len 16384 \
    --reasoning-parser gemma4 \
    --tool-call-parser gemma4 \
    --enable-auto-tool-choice \
    --chat-template examples/tool_chat_template_gemma4.jinja
  ```
  Enable per-request via `extra_body={"chat_template_kwargs": {"enable_thinking": True}}`.

  ### Dynamic Vision Resolution
  Supported values: 70, 140, 280 (default), 560, 1120 tokens/image.
  ```bash
  vllm serve google/gemma-4-26B-A4B-it \
    --mm-processor-kwargs '{"max_soft_tokens": 560}'
  ```

  ## Configuration Tips

  - Set `--max-model-len` to match your workload.
  - `--gpu-memory-utilization 0.90-0.95` maximizes KV cache.
  - Text-only workloads: `--limit-mm-per-prompt image=0,audio=0`.
  - `--async-scheduling` improves throughput.
  - FP8 KV cache (`--kv-cache-dtype fp8`) saves ~50% KV memory.
  - For MoE, TEP (tensor-expert parallelism) and DEP (data-expert parallelism) strategies scale better than pure TP at large node counts.

  ## Throughput vs Latency

  | Goal | TP | `--max-num-seqs` | Notes |
  |------|----|------------------|-------|
  | Max throughput | 1-2 | 256-512 | Best tok/s per GPU |
  | Min latency   | 4-8 | 8-16   | Best TTFT/TPOT |
  | Balanced      | 2   | 128    | Mixed workloads |

  ## References

  - [Model card](https://huggingface.co/google/gemma-4-26B-A4B-it)
  - [Gemma docs](https://ai.google.dev/gemma/docs)
  - [vLLM Gemma 4 tool-call template](https://github.com/vllm-project/vllm/blob/main/examples/tool_chat_template_gemma4.jinja)
  - [TPU recipes: Trillium](https://github.com/AI-Hypercomputer/tpu-recipes/tree/main/inference/trillium/vLLM/Gemma4)
  - [TPU recipes: Ironwood](https://github.com/AI-Hypercomputer/tpu-recipes/blob/main/inference/ironwood/vLLM/Gemma4/)
